on surges despite consistent user traffic. The solution must monitor InputTokenCount and OutputTokenCount, detect unusual patterns per tool integration, identify which tools cause abnormal consumption, and automatically adjust thresholds as traffic changes.\n\nWhich solution meets these requirements?", "opts": ["Use CloudWatch Logs to capture model invocation logs. Create CloudWatch dashboards for token metrics. Configure static CloudWatch alarms with fixed thresholds per tool.", "Store model invocation logs in S3. Use AWS Glue and Athena to analyze token usage trends.", "Use CloudWatch Logs for model invocation logs. Create CloudWatch metric filters to extract tool-specific invocation patterns. Apply CloudWatch anomaly detection alarms to automatically adjust baselines per tool's token metrics.", "Store invocation logs in S3. Use SageMaker Processing to analyze token patterns. Deploy custom anomaly detection models."], "correct": [2], "exp": "Model invocation logs to CloudWatch Logs capture all request details. Metric filters extract tool-specific patterns (filtering by tool name in the log). CloudWatch anomaly detection uses ML to automatically learn baseline token consumption per tool and alert when it deviates — no static thresholds needed.", "wrong": "A: Static thresholds don't adapt to changing traffic patterns. B: Glue/Athena is batch analysis, not real-time detection. D: SageMaker custom anomaly models add significant operational overhead."}, {"id": 49, "domain": "Domain 1", "src": "Practice", "scenario": "A company needs to store and query 2 billion product embeddings for nightly batch similarity searches. Queries run once per day during off-peak hours and results are written to S3 for downstream processing. The company wants to minimize cost.\n\nWhich vector store is MOST appropriate?", "opts": ["Amazon OpenSearch Serverless with k-NN enabled", "Amazon Aurora PostgreSQL with pgvector extension", "Amazon S3 Vectors", "Amazon MemoryDB for Redis with vector search"], "correct": [2], "exp": "Amazon S3 Vectors is purpose-built for large-scale vector storage at low cost — S3 pricing versus OpenSearch cluster pricing. For 2B vectors with infrequent batch queries, S3 Vectors provides the lowest cost. It integrates natively with Bedrock Knowledge Bases and supports batch query patterns.", "wrong": "A: OpenSearch Serverless is priced for interactive query workloads; expensive at 2B vector scale. B: Aurora pgvector is optimized for operational transactional workloads with frequent CRUD operations. D: MemoryDB is in-memory (very expensive at 2B vectors) and optimized for microsecond-latency real-time access."}, {"id": 50, "domain": "Domain 1", "src": "Practice", "scenario": "A developer is building a multi-tenant SaaS RAG application where each customer should only retrieve their own documents. All documents are stored in the same S3 bucket and indexed in the same Bedrock Knowledge Base. What is the RECOMMENDED approach for tenant isolation with LEAST operational overhead?", "opts": ["Create a separate Bedrock Knowledge Base for each customer tenant.", "Apply metadata filtering using tenant ID tags on documents. Pass the tenant filter in each RetrieveAndGenerate API call.", "Implement document-level access control using IAM policies with resource-based conditions on the vector store.", "Create separate S3 buckets and separate OpenSearch Serverless collections per tenant."], "correct": [1], "exp": "Metadata filtering in Bedrock Knowledge Bases lets you tag each document with a tenantId attribute and include a filter in the RetrieveAndGenerate call to only retrieve that tenant's documents. This is the native, lowest-overhead multi-tenancy approach — one KB for all tenants.", "wrong": "A: Separate KBs per tenant creates management overhead that scales linearly with customers. C: IAM policies are coarse-grained and don't filter at the document level within a shared KB. D: Separate S3 + OpenSearch per tenant is maximum operational overhead."}, {"id": 51, "domain": "Domain 1", "src": "Practice", "scenario": "A company uses Bedrock Knowledge Bases and users report that retrieved chunks are missing context — clauses in a contract reference earlier sections but the retrieved chunk doesn't include those earlier sections.\n\nWhich configuration change addresses this?", "opts": ["Increase the number of retrieved results (top-K) from 5 to 20.", "Enable hierarchical chunking to create parent-child chunks with broader context.", "Increase chunk size and add 20% token overlap between adjacent chunks.", "Switch from the default chunking strategy to semantic chunking."], "correct": [2], "exp": "Adding overlap between chunks ensures that content near chunk boundaries appears in both the ending chunk and the beginning of the next chunk. This prevents context loss for cross-references. Combined with larger chunks, this is the standard fix for missing context in adjacent sections.", "wrong": "A: More retrieved chunks helps find relevant content but doesn't fix context gaps within retrieved chunks. B: Hierarchical chunking creates parent summaries for navigation but doesn't directly fix overlap issues. D: Semantic chunking splits on topic boundaries — useful but doesn't specifically add overlap between chunks."}, {"id": 52, "domain": "Domain 1", "src": "Practice", "scenario": "A developer needs to invoke a Bedrock model with streaming enabled so the application can display tokens as they are generated, improving perceived latency for users.\n\nWhich API should be used?", "opts": ["InvokeModel API with a StreamingResponse parameter set to true", "InvokeModelWithResponseStream API", "Converse API with stream:true in the request body", "ConverseStream API"], "correct": [3], "exp": "The ConverseStream API is the streaming variant of the Converse API. It returns a stream of events as tokens are generated, enabling real-time display of model outputs. For the multi-turn conversational format, ConverseStream is the recommended streaming API.", "wrong": "A: InvokeModel doesn't have a StreamingResponse parameter — it's a synchronous single-response API. B: InvokeModelWithResponseStream works but uses the lower-level format (model-specific request body). C: The Converse API doesn't have a stream parameter in the body; ConverseStream is the separate streaming API."}, {"id": 53, "domain": "Domain 1", "src": "Practice", "scenario": "When should a developer choose fine-tuning over RAG for a generative AI application on Amazon Bedrock?", "opts": ["When the model needs to answer questions about a large corpus of continuously updated documents.", "When the model needs to learn a specific communication style, tone, or domain-specific terminology patterns.", "When the model needs access to real-time data from APIs or databases.", "When the model needs to cite specific source documents in its responses."], "correct": [1], "exp": "Fine-tuning changes how the model behaves — its style, tone, format, and specialized terminology. It's ideal when you need the model to adopt a specific persona or writing style that isn't achievable through prompting. RAG is better for factual knowledge (updated docs, source citations, real-time data).", "wrong": "A: RAG is superior for large, updated document corpora — fine-tuning memorizes data that quickly goes stale. C: RAG with action groups/tools is the right approach for real-time data. D: RAG with Knowledge Bases provides native citation support; fine-tuning doesn't add citation capability."}, {"id": 54, "domain": "Domain 1", "src": "Practice", "scenario": "A developer wants all Amazon Bedrock API calls from an application in a private VPC to stay within the AWS network and not traverse the public internet.\n\nWhat must be configured?", "opts": ["Enable VPC Flow Logs to monitor Bedrock traffic.", "Create an Interface VPC Endpoint for Amazon Bedrock in the VPC and update the security groups.", "Configure a NAT Gateway in the VPC to allow outbound HTTPS to Bedrock.", "Set up AWS Direct Connect with a private VIF to the Bedrock service endpoint."], "correct": [1], "exp": "An Interface VPC Endpoint (powered by AWS PrivateLink) for Amazon Bedrock creates a private endpoint within your VPC. Traffic between your application and Bedrock flows over the AWS private network, never the public internet. Security groups and endpoint policies control access.", "wrong": "A: Flow Logs monitor traffic but don't route it privately. C: NAT Gateway routes traffic to the public internet — the opposite of what's needed. D: Direct Connect provides dedicated connectivity from on-premises; it doesn't address VPC-to-Bedrock routing within AWS."}, {"id": 55, "domain": "Domain 1", "src": "Practice", "scenario": "A company has a diverse document library including PDFs, Word docs, HTML pages, and Markdown files. They want to build a semantic search application using Bedrock Knowledge Bases. Which document types are natively supported without preprocessing?", "opts": ["PDF and plain text only", "PDF, Word (DOCX), HTML, Markdown, and plain text", "PDF, HTML, and plain text only", "All document types including PowerPoint and Excel"], "correct": [1], "exp": "Amazon Bedrock Knowledge Bases natively supports: PDF, Word (DOCX), HTML, Markdown (.md), and plain text (.txt) files. These are parsed, chunked, and embedded automatically without any preprocessing. This covers the company's entire document library.", "wrong": "A: Significantly undersells KB capabilities. C: Word and Markdown are also natively supported. D: PowerPoint (PPTX) and Excel (XLSX) are NOT natively supported — they would need to be converted first."}, {"id": 56, "domain": "Domain 1", "src": "Practice", "scenario": "An application uses the Amazon Bedrock Converse API to build a multi-turn chat application. The developer wants to maintain the last 10 conversation turns for context while keeping costs low.\n\nWhich approach is recommended?", "opts": ["Store all conversation history in a DynamoDB table and send the full history on every request.", "Maintain a sliding window of the last 10 message pairs in memory and pass them in the messages array of each Converse API call.", "Use Bedrock Agent session management to automatically maintain conversation context.", "Enable Bedrock Knowledge Base conversation history logging and retrieve past turns with semantic search."], "correct": [1], "exp": "The Converse API accepts a messages array with alternating user/assistant turns. A sliding window approach keeps only the last N turns in memory and sends them with each request. This limits context to what's needed, controlling cost while maintaining recent conversation context.", "wrong": "A: DynamoDB for storage is fine, but sending full unbounded history on every request grows cost indefinitely. C: Bedrock Agents manage sessions for agent interactions, not general multi-turn chat. D: KB conversation history retrieval is a complex pattern that adds latency and doesn't maintain strict conversation ordering."}, {"id": 57, "domain": "Domain 1", "src": "Practice", "scenario": "What is the PRIMARY difference between Amazon Titan Embeddings V2 and Amazon Titan Multimodal Embeddings?", "opts": ["V2 supports text only; Multimodal supports text and images", "V2 supports text in 100+ languages with configurable output dimensions; Multimodal supports both images and text for cross-modal search", "V2 has a larger context window; Multimodal has faster inference", "V2 is for batch use; Multimodal is for real-time use"], "correct": [1], "exp": "Amazon Titan Embeddings V2 is a text-only embedding model that supports 100+ languages and configurable output dimensions (256, 512, 1024). Amazon Titan Multimodal Embeddings supports both text and images in the same embedding space, enabling cross-modal search (find images using text queries and vice versa).", "wrong": "A: Partially correct but misses the language and dimension features of V2. C: Context window and inference speed aren't the primary differentiating factors. D: Both support real-time and batch use cases."}, {"id": 58, "domain": "Domain 2", "src": "Practice", "scenario": "A developer builds a Bedrock Agent that needs to query a production MySQL database to answer customer questions. The agent should generate and execute SQL queries without hardcoded logic. What is the CORRECT architecture?", "opts": ["Attach a Bedrock Knowledge Base indexing the database schema to the agent.", "Create an action group with a Lambda function that accepts natural language, generates SQL, and executes it against the database.", "Use Bedrock Flows with a database connector node.", "Enable the Bedrock Agent's built-in SQL generation feature."], "correct": [1], "exp": "Action groups in Bedrock Agents define tools (Lambda functions) the agent can call. The Lambda function can accept parameters from the agent (table names, filter conditions), execute SQL against the database, and return results. The agent handles the natural language → SQL reasoning.", "wrong": "A: KB indexing the schema helps with discovery but doesn't execute queries. C: Bedrock Flows doesn't have a built-in database connector node. D: Bedrock Agents don't have a built-in SQL generation feature — that's implemented via action groups."}, {"id": 59, "domain": "Domain 2", "src": "Practice", "scenario": "A team wants to version, test, and deploy different system prompts for a production Bedrock application. They need an approval workflow before any prompt version goes to production, and want to roll back instantly if issues arise.\n\nWhich Bedrock service provides native versioning and lifecycle management for prompts?", "opts": ["Amazon Bedrock Model Evaluation", "Amazon Bedrock Prompt Management", "AWS Systems Manager Parameter Store", "Amazon DynamoDB with a custom versioning scheme"], "correct": [1], "exp": "Amazon Bedrock Prompt Management provides native prompt versioning — creating numbered versions, tagging (e.g., 'production', 'staging'), and managing lifecycle. IAM policies can restrict which principal can use production-tagged versions, enabling governance workflows. Instant rollback is done by pointing to a previous version.", "wrong": "A: Model Evaluation compares model outputs, not manages prompt versions. C: Parameter Store can store prompts as strings but lacks Bedrock-native features (no version tagging, no direct API integration). D: Custom DynamoDB requires building all lifecycle management logic."}, {"id": 60, "domain": "Domain 2", "src": "Practice", "scenario": "An AI pipeline needs human review and approval before publishing AI-generated content. The pipeline must pause indefinitely until a reviewer approves or rejects, then continue or terminate accordingly.\n\nWhich implementation pattern is recommended?", "opts": ["Poll a DynamoDB table every 30 seconds for an approval status update.", "Use AWS Step Functions with a task state and the .waitForTaskToken integration pattern.", "Create a Lambda function that sleeps for 24 hours waiting for approval.", "Use Amazon SQS with a visibility timeout set to the maximum (12 hours)."], "correct": [1], "exp": "Step Functions .waitForTaskToken sends a token to an external system (email, approval UI, Slack) and pauses the workflow until the token is returned via SendTaskSuccess or SendTaskFailure. The workflow can pause for days if needed, with no polling or Lambda sleeping. This is the standard AWS human-in-the-loop pattern.", "wrong": "A: Polling creates unnecessary compute and has delays. C: Lambda has a maximum 15-minute timeout — can't sleep 24 hours. D: SQS visibility timeout is for message processing delay, not workflow pause."}, {"id": 61, "domain": "Domain 2", "src": "Practice", "scenario": "A company wants to build a visual workflow tool for business analysts to chain AI tasks together: data extraction → analysis → report generation. The tool must be no-code/low-code and integrate with Amazon Bedrock models.\n\nWhich AWS service is MOST appropriate?", "opts": ["AWS Step Functions with visual workflow editor", "Amazon Bedrock Flows", "Amazon Bedrock Agents with chained action groups", "AWS Glue visual ETL"], "correct": [1], "exp": "Amazon Bedrock Flows is specifically designed as a visual tool for building AI workflows by connecting Bedrock components (prompts, knowledge bases, agents, Lambda functions) in a graph. It's designed for non-developer use with a drag-and-drop interface in the Bedrock console.", "wrong": "A: Step Functions Express/Standard requires defining states in JSON/YAML — not truly no-code for business analysts. C: Agents are for autonomous reasoning, not visual workflow definition. D: Glue visual ETL is for data transformation, not AI task orchestration."}, {"id": 62, "domain": "Domain 2", "src": "Practice", "scenario": "A Bedrock Agent invokes 5 independent Lambda functions (weather API, news API, stock API, calendar API, email API) to answer a user query. Each function takes 2 seconds. The total response time is 10 seconds (sequential execution).\n\nHow can the developer reduce latency?", "opts": ["Increase Lambda memory allocation for each function.", "Migrate from Bedrock Agents to Bedrock Flows for better performance.", "Configure the agent to call multiple action groups in parallel when they are independent.", "Deploy Lambda functions in the same Region as the Bedrock endpoint."], "correct": [2], "exp": "Amazon Bedrock Agents support parallel function calling — when multiple tool calls are independent, the agent can invoke them simultaneously. This would reduce 10 seconds of sequential calls to approximately 2 seconds (the time of the slowest single call). This is configured through the agent's orchestration settings.", "wrong": "A: Memory allocation helps individual function performance but doesn't address sequential bottleneck. B: Flows could execute parallel nodes but migrating the whole agent adds development overhead. D: Same-region deployment reduces network latency marginally but doesn't address the sequential execution bottleneck."}, {"id": 63, "domain": "Domain 2", "src": "Practice", "scenario": "A company needs to prevent their Bedrock-powered chatbot from discussing competitor products in both user queries and model responses. The solution must work automatically without modifying the application code.\n\nWhich Bedrock feature should be configured?", "opts": ["Configure content filters with the HATE category set to maximum sensitivity.", "Add competitor product names to denied topics in Bedrock Guardrails.", "Configure custom word filters in Bedrock Guardrails to block competitor names.", "Add instructions in the system prompt to avoid mentioning competitors."], "correct": [2], "exp": "Bedrock Guardrails custom word filters allow you to specify exact words and phrases to block in both inputs and outputs. For competitor product names, word filters provide precise, automatic blocking without application code changes. This applies at the guardrail layer before/after model invocation.", "wrong": "A: Content filters target harmful content (hate speech, violence) — not competitive product mentions. B: Denied topics work better for broad topic categories (e.g., 'financial advice'); word filters are better for specific names. D: System prompt instructions rely on model compliance — not enforced at the infrastructure layer."}, {"id": 64, "domain": "Domain 2", "src": "Practice", "scenario": "A developer needs to store OAuth credentials for external APIs that Bedrock Agent Lambda functions call. The credentials must be encrypted, automatically rotated, and auditable.\n\nWhere should credentials be stored?", "opts": ["Hard-code in Lambda environment variables with KMS encryption enabled.", "Store in AWS Secrets Manager with automatic rotation enabled. Retrieve in Lambda at runtime.", "Store in AWS Systems Manager Parameter Store as SecureString parameters.", "Store in Amazon S3 with server-side encryption."], "correct": [1], "exp": "AWS Secrets Manager is purpose-built for storing, encrypting, rotating, and auditing credentials. It supports automatic rotation with custom Lambda rotation functions. Lambda retrieves secrets at runtime via the AWS SDK. CloudTrail logs every secret access for auditing.", "wrong": "A: Lambda environment variables can be KMS-encrypted but don't support automatic rotation. C: SSM Parameter Store SecureString is a good option but lacks native automatic rotation. D: S3 for secrets lacks the access controls, rotation, and auditing of Secrets Manager."}, {"id": 65, "domain": "Domain 2", "src": "Practice", "scenario": "A company has a large static system prompt (12,000 tokens) that is identical for all users of their Bedrock application. They process 500,000 requests per day. The prompt accounts for 85% of total token costs.\n\nWhich feature provides the GREATEST cost reduction?", "opts": ["Compress the system prompt by summarizing it to 2,000 tokens.", "Enable Bedrock prompt caching for the static system prompt prefix.", "Switch to a model with a lower per-token price.", "Use Bedrock batch inference for all requests."], "correct": [1], "exp": "Bedrock prompt caching stores the processed key-value (KV) cache state for the static prefix (system prompt). Subsequent requests with the same prefix skip processing those tokens — reducing both cost (cached tokens cost much less) and latency. With 85% of tokens in a static prompt, caching reduces costs dramatically.", "wrong": "A: Summarizing may lose important instructions and reduces quality. C: Switching models may reduce quality and still processes all tokens. D: Batch inference is for non-real-time workloads; doesn't help if responses are needed immediately."}, {"id": 66, "domain": "Domain 2", "src": "Practice", "scenario": "A developer deploys a Bedrock Agent in production. Users report the agent sometimes goes into infinite loops, calling the same tool repeatedly. What configuration prevents this?", "opts": ["Set a low temperature value (0.1) to reduce randomness in tool selection.", "Configure the maximum number of reasoning steps for the agent.", "Add Guardrails to detect repeated tool calls.", "Increase the Lambda function timeout to terminate long-running loops."], "correct": [1], "exp": "Amazon Bedrock Agents have a configurable maximum number of reasoning steps (orchestration steps). When the agent reaches this limit, it stops the loop and returns the best available response. Setting this appropriately (e.g., 5-10 steps) prevents infinite loops and controls costs.", "wrong": "A: Temperature affects generation diversity but doesn't prevent logical loops in reasoning. C: Guardrails can't detect patterns in tool call history. D: Lambda timeout terminates individual function calls, not the overall agent reasoning loop."}, {"id": 67, "domain": "Domain 2", "src": "Practice", "scenario": "A company wants to build a supervisor agent that coordinates specialized sub-agents (research agent, writing agent, review agent) to complete complex content creation tasks.\n\nWhich architecture implements this multi-agent pattern on Amazon Bedrock?", "opts": ["Create a single Bedrock Agent with three separate knowledge bases for each specialty.", "Create a supervisor Bedrock Agent with action groups that invoke each sub-agent via the Bedrock Agent Runtime API.", "Use Bedrock Flows with three separate prompt nodes for each specialty.", "Deploy three separate Lambda functions and chain them with SQS."], "correct": [1], "exp": "Multi-agent orchestration in Amazon Bedrock uses a supervisor agent that can invoke other Bedrock Agents as sub-agents via action groups. The supervisor reasons about task decomposition and routes sub-tasks to specialized agents. Each sub-agent can have its own KB, tools, and specialization.", "wrong": "A: Multiple KBs in one agent provides different data sources, not multi-agent coordination with different capabilities. C: Flows executes a predefined workflow without dynamic agent reasoning. D: Lambda chaining doesn't leverage Bedrock's agent reasoning capabilities."}, {"id": 68, "domain": "Domain 3", "src": "Practice", "scenario": "A company stores sensitive customer data in Amazon S3. Security team wants automatic discovery and classification of PII across all S3 buckets. No custom code should be written.\n\nWhich service provides this capability?", "opts": ["Amazon Rekognition for image-based PII detection", "Amazon Comprehend for NLP-based entity extraction", "Amazon Macie for automated S3 PII discovery and classification", "AWS Glue Data Quality for data profiling"], "correct": [2], "exp": "Amazon Macie is specifically designed for automated PII discovery and classification in Amazon S3. It uses machine learning to identify sensitive data (SSNs, credit cards, credentials, health records) across all S3 buckets with no custom code. It provides findings with severity levels and integrates with Security Hub.", "wrong": "A: Rekognition is for image analysis, not text-based PII in documents. B: Comprehend can detect PII but requires custom integration code; Macie is fully managed for S3. D: Glue Data Quality checks data quality rules, not PII classification."}, {"id": 69, "domain": "Domain 3", "src": "Practice", "scenario": "A Bedrock application generates customer-facing emails. Compliance requires that no PII (SSNs, credit card numbers, passport numbers) appears in any model output sent to customers.\n\nWhich Bedrock feature prevents PII in model outputs?", "opts": ["Amazon Macie integration with the Bedrock API to scan outputs.", "Sensitive information filters in Amazon Bedrock Guardrails configured with PII entity types.", "A post-processing Lambda function with regex patterns for PII detection.", "Amazon Comprehend PII detection called after each model invocation."], "correct": [1], "exp": "Bedrock Guardrails includes sensitive information filters that can be configured to detect and redact specific PII types (SSN, credit card, passport, etc.) in model outputs before they reach the user. This is enforced at the guardrail layer — no application code changes needed.", "wrong": "A: Macie scans S3 buckets, not Bedrock API responses in real time. C: Lambda post-processing works but requires custom regex maintenance and adds latency; Guardrails is purpose-built. D: Comprehend PII detection is an extra API call with added latency; Guardrails is integrated."}, {"id": 70, "domain": "Domain 3", "src": "Practice", "scenario": "A company's compliance team requires a complete audit trail of all AWS API calls made to Amazon Bedrock services, including who made the call, when, from where, and what parameters were used.\n\nWhich service provides this?", "opts": ["Amazon CloudWatch Logs with Bedrock model invocation logging", "AWS CloudTrail data event logging for Amazon Bedrock", "Amazon Bedrock model invocation logging to S3", "Both CloudTrail (for API-level audit) and Bedrock invocation logging (for content audit)"], "correct": [3], "exp": "CloudTrail records all management and data API calls (who, when, from where, what parameters) — essential for API-level audit. Bedrock model invocation logging captures the actual prompt/response content for content compliance. Together they provide a complete audit trail. Compliance typically requires both.", "wrong": "A: CloudWatch with invocation logs captures content but not full API metadata (identity, IP, parameters). B: CloudTrail alone provides API audit but doesn't capture model input/output content. C: Invocation logging to S3 captures content but not the API call metadata that CloudTrail provides."}, {"id": 71, "domain": "Domain 3", "src": "Practice", "scenario": "A company needs to ensure SCP (Service Control Policy) compliance that restricts Amazon Bedrock usage to only the us-east-1 and eu-west-1 regions for GDPR compliance.\n\nWhich SCP condition achieves this?", "opts": ["Use Condition: aws:RequestedRegion with NotAction to allow only specific regions", "Use Condition: aws:RequestedRegion with a StringNotEquals condition to deny Bedrock API calls from non-approved regions", "Create separate IAM policies for each approved region with explicit allows", "Use AWS Config rules to detect and remediate Bedrock usage in non-approved regions"], "correct": [1], "exp": "A Service Control Policy using Deny with Condition: aws:RequestedRegion StringNotEquals [us-east-1, eu-west-1] prevents all Bedrock API calls to any other region. SCPs apply to the entire organization and cannot be overridden by member accounts — perfect for GDPR enforcement.", "wrong": "A: NotAction with RequestedRegion is a more complex pattern; StringNotEquals on RequestedRegion with Deny is cleaner. C: IAM policies are account-level and can be overridden; SCPs cannot. D: Config rules detect violations after the fact; SCPs prevent them proactively."}, {"id": 72, "domain": "Domain 3", "src": "Practice", "scenario": "A developer discovers that a Bedrock application is vulnerable to prompt injection — malicious users craft inputs that override the system prompt and extract confidential instructions.\n\nWhich Bedrock Guardrails feature detects and blocks prompt injection attempts?", "opts": ["Content filters with the PROMPT_ATTACK detection category enabled", "Denied topics configured with prompt injection patterns", "Sensitive information filters configured to protect the system prompt", "Contextual grounding checks to validate user queries"], "correct": [0], "exp": "Amazon Bedrock Guardrails includes a PROMPT_ATTACK content filter that specifically detects prompt injection and jailbreak attempts. When enabled, it scores input messages for signs of adversarial prompting and blocks requests that exceed the threshold — exactly protecting against system prompt extraction.", "wrong": "B: Denied topics block specific conversation topics, not injection techniques. C: Sensitive information filters protect PII/data, not prompt injection patterns. D: Contextual grounding checks verify responses align with source documents, not injection detection."}, {"id": 73, "domain": "Domain 3", "src": "Practice", "scenario": "A company requires all Amazon Bedrock Knowledge Base data to be encrypted with a customer-managed KMS key (CMK) they control. They want to be able to revoke access by disabling the key.\n\nWhat steps are REQUIRED?", "opts": ["Enable AWS-managed encryption on the S3 bucket; no additional configuration needed for the Knowledge Base.", "Specify the CMK ARN when creating the Knowledge Base AND grant the Bedrock service role kms:Decrypt and kms:GenerateDataKey permissions in the CMK key policy.", "Create the Knowledge Base with default encryption, then enable CMK via the KB settings after creation.", "Enable S3 server-side encryption with CMK; the Knowledge Base inherits this setting automatically."], "correct": [1], "exp": "CMK encryption in Bedrock Knowledge Bases requires two steps: (1) specify the CMK ARN during KB creation (cannot be changed after) and (2) the CMK key policy must grant the Bedrock service role permission to use the key. If either is missing, creation fails. Disabling the CMK revokes all access to encrypted KB data.", "wrong": "A: AWS-managed keys don't support customer-controlled revocation. C: Encryption type cannot be changed after Knowledge Base creation. D: The KB vector store has its own encryption separate from S3; S3 CMK doesn't automatically encrypt the vector store."}, {"id": 74, "domain": "Domain 3", "src": "Practice", "scenario": "A company needs to implement responsible AI practices. All AI-generated content must be logged for fairness review, and the system must maintain explainability reports showing which source documents influenced each response.\n\nWhich combination of Bedrock features supports this?", "opts": ["Bedrock Guardrails for content safety + CloudWatch for logging", "Bedrock model invocation logging for audit trails + Knowledge Bases citations for explainability", "Bedrock model evaluation jobs + SageMaker Clarify for bias detection", "Amazon A2I for human review + Bedrock Flows for workflow management"], "correct": [1], "exp": "Model invocation logging records all prompts and responses for fairness review and audit. Bedrock Knowledge Bases citations attach source document references to each response, providing built-in explainability showing which documents influenced the answer — meeting both requirements natively.", "wrong": "A: Guardrails blocks content but doesn't provide explainability of which sources were used. C: Model evaluation is batch assessment, not per-request explainability. D: A2I provides human review workflows but not automatic source attribution."}, {"id": 75, "domain": "Domain 4", "src": "Practice", "scenario": "A company needs guaranteed inference capacity for a critical Bedrock application during a major product launch event (specific 3-day window). On-demand quotas are insufficient.\n\nWhich option provides guaranteed capacity?", "opts": ["Submit a Service Quotas increase request 2 weeks in advance.", "Purchase Amazon Bedrock Provisioned Throughput with a 1-month commitment for the required model units.", "Configure cross-region inference profiles to distribute load across 5 regions.", "Deploy the model on SageMaker with guaranteed instance reservations."], "correct": [1], "exp": "Amazon Bedrock Provisioned Throughput purchases a guaranteed number of model units for a specified commitment period (1 month or 6 months). This provides reserved capacity that cannot be throttled, unlike on-demand. For a critical product launch, this is the correct solution for guaranteed availability.", "wrong": "A: Quota increases are not guaranteed and may take time; approved quotas can still be throttled by AWS. C: Cross-region inference distributes quota across regions but doesn't guarantee additional capacity. D: SageMaker requires deploying and managing your own model instance."}, {"id": 76, "domain": "Domain 4", "src": "Practice", "scenario": "A media company needs to generate summaries for 5 million news articles per day. The summaries are needed within 6 hours of request submission. How can this be done MOST cost-effectively?", "opts": ["Use on-demand Bedrock inference with 500 concurrent Lambda functions.", "Use Amazon Bedrock batch inference jobs with S3 JSONL input/output. Schedule the job at off-peak hours.", "Purchase Provisioned Throughput sized for 5M articles / 6 hours.", "Use SageMaker Batch Transform with a foundation model endpoint."], "correct": [1], "exp": "Bedrock batch inference is purpose-built for large-scale non-real-time workloads. It processes jobs from S3 (JSONL format), costs up to 50% less than on-demand inference, and can complete 5M articles within 6 hours with appropriate configuration. S3 I/O eliminates the need for request/response orchestration.", "wrong": "A: 500 concurrent Lambdas approach on-demand pricing — significantly more expensive than batch and requires custom orchestration. C: Provisioned Throughput for 5M/6hrs would require many model units and is very expensive. D: SageMaker Batch Transform requires deploying a model endpoint with more infrastructure management."}, {"id": 77, "domain": "Domain 4", "src": "Practice", "scenario": "An application uses a 12,000-token system prompt identical for all users. The team wants to reduce latency from 3 seconds to under 1 second for the time-to-first-token (TTFT).\n\nWhich feature addresses this?", "opts": ["Enable response streaming to start showing tokens before full generation completes.", "Enable Bedrock prompt caching to cache the processed KV state of the system prompt.", "Reduce the system prompt to 3,000 tokens by removing less important sections.", "Switch from Claude to Nova Micro for faster inference."], "correct": [1], "exp": "Bedrock prompt caching stores the computed key-value attention state of the static system prompt. On subsequent requests, Bedrock skips recomputing those 12,000 tokens, dramatically reducing time-to-first-token (TTFT). This is the direct solution to TTFT latency caused by large static prompts.", "wrong": "A: Streaming shows tokens earlier but doesn't reduce TTFT — the model still processes all input first. C: Truncating the prompt may reduce quality/completeness. D: Switching models involves quality tradeoffs and doesn't address the root cause (large static prefix processing)."}, {"id": 78, "domain": "Domain 4", "src": "Practice", "scenario": "A company runs a Bedrock application that processes the same 500 customer FAQ responses thousands of times daily. Each FAQ response is deterministic. The CTO wants to reduce inference costs by 80%.\n\nWhich architecture achieves this goal?", "opts": ["Use Bedrock batch inference to process FAQs once per night.", "Implement semantic caching — store FAQ responses in ElastiCache; before invoking the model, check cache by semantic similarity of the query.", "Enable Bedrock prompt caching for the FAQ system prompt.", "Use Amazon CloudFront to cache API responses at the edge."], "correct": [1], "exp": "Semantic caching stores question-answer pairs. When a new query arrives, it's compared (via vector similarity) to cached questions. If a match is found above a similarity threshold, the cached answer is returned without model invocation — 0 cost. With 500 repeated FAQs, cache hit rate approaches 100%, achieving &gt;80% cost reduction.", "wrong": "A: Batch inference is for non-real-time processing; doesn't help for real-time FAQ responses. C: Prompt caching caches the prompt prefix processing but still invokes the model for each request. D: CloudFront caches identical HTTP responses but FAQs may have slight query variations that bypass the cache."}, {"id": 79, "domain": "Domain 4", "src": "Practice", "scenario": "A team wants to track Amazon Bedrock costs separately for three different projects (Project Alpha, Beta, Gamma) within the same AWS account.\n\nWhat is the recommended approach?", "opts": ["Create separate AWS accounts for each project.", "Use AWS Resource Groups to group Bedrock resources by project.", "Apply cost allocation tags (project:alpha, project:beta, project:gamma) to Bedrock API calls and enable them in AWS Cost Explorer.", "Create separate IAM roles for each project and filter costs by role in Cost and Usage Reports."], "correct": [2], "exp": "AWS supports cost allocation tags on Amazon Bedrock API calls. Apply a 'project' tag with the project name. Enable the tag as a cost allocation tag in Billing settings. Then use AWS Cost Explorer or CUR to filter and report costs per project tag. This is the standard multi-project cost tracking approach.", "wrong": "A: Separate accounts is a heavy solution for simple cost tracking within the same team. B: Resource Groups organize resources but don't provide cost breakdown by group. D: IAM role filtering is not a supported cost reporting dimension in Cost Explorer."}, {"id": 80, "domain": "Domain 5", "src": "Practice", "scenario": "A RAG application's responses are factually correct but users complain they don't answer the specific question asked. Which evaluation metric specifically measures whether a response addresses the question?", "opts": ["Groundedness — measures alignment between response and source documents", "Answer Relevancy — measures whether the response directly addresses the user's question", "Faithfulness — measures factual consistency between response and source", "Coherence — measures logical flow and readability of the response"], "correct": [1], "exp": "Answer Relevancy specifically measures whether the model's response addresses the question that was asked. A response can be factually correct (high groundedness/faithfulness) but off-topic — Answer Relevancy catches this. In RAGAS and Bedrock evaluation, this is a distinct metric from faithfulness.", "wrong": "A: Groundedness/Faithfulness measures whether facts in the response are supported by source documents — not whether the question was answered. C: Faithfulness is the same concept as groundedness — factual accuracy vs. sources. D: Coherence measures writing quality, not relevance to the question."}, {"id": 81, "domain": "Domain 5", "src": "Practice", "scenario": "A developer updated a Bedrock Knowledge Base by adding 1,000 new documents, but users still receive old answers that don't use the new content. The documents are in S3.\n\nWhat is the MOST likely cause?", "opts": ["The embedding model was updated and old/new embeddings are incompatible.", "The Knowledge Base sync job was not run after the new documents were added to S3.", "The chunk size configuration needs to be updated for the new document format.", "The retrieval top-K setting is too low to include the new documents."], "correct": [1], "exp": "Amazon Bedrock Knowledge Bases do NOT automatically sync when new documents are added to S3. After adding documents, you must trigger an ingestion/sync job (manually or via automation). Until the sync completes, new documents are not indexed in the vector store and won't be retrieved.", "wrong": "A: Embedding model changes would affect old documents too, causing much broader retrieval issues. C: Chunk size affects how documents are split but wouldn't prevent new documents from being indexed after a sync. D: Top-K affects how many results are returned, not whether new documents are indexed."}, {"id": 82, "domain": "Domain 5", "src": "Practice", "scenario": "A Bedrock application produces inconsistent outputs for identical inputs across multiple invocations. The development team needs deterministic, reproducible outputs for testing.\n\nWhich inference parameters should be set?", "opts": ["Set temperature to 0 and top_p to 1.0", "Set temperature to 0.5 and top_k to 0", "Set max_tokens to a fixed value and use a fixed random seed", "Set temperature to 1.0 for maximum consistency"], "correct": [0], "exp": "Setting temperature to 0 eliminates randomness in token selection (always selects the highest probability token). With top_p=1.0, there's no nucleus sampling cutoff. Together these make generation deterministic for the same input, enabling reproducible test outputs.", "wrong": "B: temperature=0.5 still introduces randomness. C: max_tokens controls length, not randomness; random seed support varies by model. D: temperature=1.0 is the default sampling temperature — maximum randomness, not consistency."}, {"id": 83, "domain": "Domain 5", "src": "Practice", "scenario": "A Bedrock Knowledge Base ingestion job fails for 25% of documents. The CloudWatch Logs show: EMBEDDING_FAILED status for the failing documents. The documents are valid PDFs. What is the MOST likely cause?", "opts": ["The PDFs are corrupted or use unsupported PDF versions.", "The Amazon Bedrock embedding model quota (tokens per minute) has been exceeded during bulk ingestion.", "The S3 bucket policy doesn't grant Bedrock read permissions on the failing files.", "The documents are too large and need to be split."], "correct": [1], "exp": "EMBEDDING_FAILED often occurs during bulk ingestion when the embedding model's tokens-per-minute (TPM) quota is exceeded. Not all documents fail (only 25%), which is consistent with rate limiting — some documents are embedded before hitting the quota. The fix is to request a quota increase or throttle the ingestion rate.", "wrong": "A: Corrupt PDFs would show different error types (parsing errors). C: If S3 permissions were wrong, all documents would fail, not just 25%. D: Oversized documents typically show RESOURCE_IGNORED status, not EMBEDDING_FAILED."}, {"id": 84, "domain": "Domain 5", "src": "Practice", "scenario": "A company wants to evaluate whether their new fine-tuned Bedrock model produces better customer service responses than the base model. They have 200 reference responses from human agents. Which evaluation approach is appropriate?", "opts": ["Deploy both models to production and use customer satisfaction scores.", "Create a Bedrock model evaluation job using LLM-as-judge to score both models on the 200 reference examples for helpfulness and accuracy.", "Run SageMaker Clarify to compare model output distributions.", "Use ROUGE-L scores to compare model responses against the human reference responses."], "correct": [1], "exp": "Amazon Bedrock model evaluation jobs let you run automated evaluations using an LLM-as-judge (another model scores responses) or reference-based metrics. Scoring both models on the same 200 examples provides a direct, controlled comparison on dimensions like helpfulness and accuracy — exactly what's needed.", "wrong": "A: Production A/B testing exposes customers to potentially worse quality. C: Clarify measures statistical bias in traditional ML; not designed for GenAI quality comparison. D: ROUGE-L measures word overlap — customer service responses don't have single correct wordings, making ROUGE inappropriate."}, {"id": 85, "domain": "Domain 5", "src": "Practice", "scenario": "A developer needs to monitor a production Bedrock application and automatically alert when:\n1. More than 5% of requests are blocked by guardrails\n2. Average response latency exceeds 3 seconds\n\nWhich combination of AWS services should be used?", "opts": ["CloudTrail with Athena queries and SNS for alerting", "CloudWatch Metrics with model invocation logging. Create CloudWatch Alarms for guardrail intervention rate and InvocationLatency metrics. Configure SNS for notifications.", "AWS X-Ray distributed tracing with CloudWatch ServiceLens dashboards", "Amazon QuickSight with real-time Bedrock metrics dashboards"], "correct": [1], "exp": "Bedrock model invocation logging sends metrics to CloudWatch including InvocationLatency and GuardrailsInterventionCount. CloudWatch Alarms can threshold these metrics (guardrail rate &gt; 5%, latency &gt; 3s) and trigger SNS notifications. This is the standard AWS operational monitoring pattern.", "wrong": "A: CloudTrail + Athena is batch query analysis — not real-time alerting. C: X-Ray provides request traces but doesn't have pre-built Bedrock guardrail metrics. D: QuickSight provides dashboards but not automated alerting."}];


const LETTERS = ['A','B','C','D','E','F'];
let state = {
  filter: 'all',
  idx: 0,
  answers: {}, // id -> [selected indices]
  flags: {},   // id -> bool
};
let filtered = [];
let shuffled = false;
let shuffleOrder = null;

// ── Persistence ──────────────────────────────────────────────────────────────
function save() {
  try { localStorage.setItem('aip_c01_v3', JSON.stringify(state)); } catch(e) {}
}
function load() {
  try {
    const d = localStorage.getItem('aip_c01_v3');
    if (d) state = {...state, ...JSON.parse(d)};
  } catch(e) {}
}

// ── Filtering ────────────────────────────────────────────────────────────────
function buildFilter(domain) {
  state.filter = domain;
  state.idx = 0;
  shuffled = false;
  shuffleOrder = null;
  document.getElementById('shuffleBadge').style.display = 'none';
  document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
  applyFilter();
  save();
}

function applyFilter() {
  const dom = state.filter;
  if (dom === 'all') {
    filtered = shuffleOrder ? shuffleOrder.slice() : QUESTIONS.slice();
  } else if (dom === 'flagged') {
    filtered = QUESTIONS.filter(q => state.flags[q.id]);
  } else if (dom === 'missed') {
    filtered = QUESTIONS.filter(q => {
      const ans = state.answers[q.id];
      if (!ans) return false;
      return !isCorrect(q, ans);
    });
  } else if (dom === 'unseen') {
    filtered = QUESTIONS.filter(q => !state.answers[q.id]);
  } else {
    filtered = QUESTIONS.filter(q => q.domain === dom);
  }
  renderFilterBtns();
  updateCounters();
  renderQ();
}

function filterFlagged() { state.filter = 'flagged'; state.idx = 0; applyFilter(); save(); }
function filterMissed()  { state.filter = 'missed';  state.idx = 0; applyFilter(); save(); }
function filterUnseen()  { state.filter = 'unseen';  state.idx = 0; applyFilter(); save(); }

function shuffleQuestions() {
  const arr = QUESTIONS.slice();
  for (let i = arr.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  shuffleOrder = arr;
  shuffled = true;
  state.filter = 'all';
  state.idx = 0;
  filtered = arr.slice();
  document.getElementById('shuffleBadge').style.display = 'inline-block';
  renderFilterBtns();
  updateCounters();
  renderQ();
}

function renderFilterBtns() {
  const domains = ['all','Domain 1','Domain 2','Domain 3','Domain 4','Domain 5'];
  const labels  = ['All','D1 — FM & Data (31%)','D2 — Implementation (26%)','D3 — Security (20%)','D4 — Optimization (12%)','D5 — Testing (11%)'];
  const counts  = {};
  domains.forEach(d => {
    counts[d] = d === 'all' ? QUESTIONS.length : QUESTIONS.filter(q => q.domain === d).length;
  });
  document.getElementById('filterBtns').innerHTML = domains.map((d,i) =>
    `<button class="fbtn ${state.filter===d&&!['flagged','missed','unseen'].includes(state.filter)?'active':''}" onclick="buildFilter('${d}')">${labels[i]} (${counts[d]})</button>`
  ).join('');
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function isCorrect(q, ans) {
  if (!ans || ans.length === 0) return false;
  const correct = q.correct.slice().sort().join(',');
  const given   = ans.slice().sort().join(',');
  return correct === given;
}

function updateCounters() {
  let correct=0, wrong=0, flagCount=0, missedCount=0, unseenCount=0;
  QUESTIONS.forEach(q => {
    const ans = state.answers[q.id];
    if (state.flags[q.id]) flagCount++;
    if (!ans) unseenCount++;
    else if (isCorrect(q, ans)) correct++;
    else { wrong++; missedCount++; }
  });
  document.getElementById('statTotal').textContent   = filtered.length;
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent   = wrong;
  document.getElementById('flagCount').textContent   = flagCount;
  document.getElementById('missedCount').textContent = missedCount;
  document.getElementById('unseenCount').textContent = unseenCount;
  const answered = correct + wrong;
  document.getElementById('statScore').textContent = answered > 0 ? Math.round(correct/answered*100)+'%' : '—';
  // Progress
  const idx = Math.min(state.idx, filtered.length-1);
  const pct = filtered.length ? Math.round((idx+1)/filtered.length*100) : 0;
  document.getElementById('progressLabel').innerHTML = `Question ${idx+1} of <span id="qTotal">${filtered.length}</span>`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('navInfo').textContent = `${idx+1} / ${filtered.length}`;
}

// ── Render Question ───────────────────────────────────────────────────────────
let pendingMulti = []; // selected indices for multi-select in progress

function renderQ() {
  if (filtered.length === 0) {
    document.getElementById('qCard').innerHTML = '<div class="empty"><p style="font-size:1.2rem;margin-bottom:.5rem">No questions in this filter.</p><p>Try a different filter above.</p></div>';
    document.getElementById('btnPrev').disabled = true;
    document.getElementById('btnNext').disabled = true;
    return;
  }
  state.idx = Math.max(0, Math.min(state.idx, filtered.length-1));
  const q = filtered[state.idx];
  const ans = state.answers[q.id];
  const submitted = !!ans;
  const correct = submitted && isCorrect(q, ans);
  const multi = q.multi ? q.multi : 1;

  pendingMulti = submitted ? [] : [];

  // Meta tags
  const srcColor = q.src === 'Official' ? '#5CBA7D' : q.src.includes('Domain') ? '#7BAEFF' : q.src === 'ExamTopics' ? '#FFB347' : q.src === 'CertHero' ? '#CC88FF' : '#9CA3AF';
  document.getElementById('qMeta').innerHTML =
    `<span class="tag tag-domain">${q.domain}</span>` +
    `<span class="tag tag-source" style="background:#1A1D27;color:${srcColor};border-color:${srcColor}66">${q.src}</span>` +
    (multi > 1 ? `<span class="tag tag-multi">SELECT ${multi}</span>` : '') +
    (q.src==='Official'?`<span class="tag" style="background:#1A3020;color:#5CBA7D;border:1px solid #2E6040;font-size:.7rem">✓ AWS Official</span>`:'');

  document.getElementById('qNum').textContent = `Q${q.id} of ${QUESTIONS.length}`;

  // Format scenario
  const formatted = q.scenario.replace(/\n/g,'<br>').replace(/\b(Amazon Bedrock|AWS|SageMaker|Lambda|CloudWatch|S3|DynamoDB|GuardDuty|Macie|Comprehend|KMS|IAM|VPC|SNS|SQS|EventBridge|Step Functions|Kinesis|Glue|Athena|QuickSight|OpenSearch|Aurora|ElastiCache|Nova Micro|Nova Lite|Nova Pro|Nova Premier|Titan|Anthropic|Claude)\b/g, '<strong>$1</strong>');
  document.getElementById('qScenario').innerHTML = formatted;

  // Options
  const opts = q.opts.map((txt, i) => {
    let cls = 'opt';
    if (submitted) {
      if (q.correct.includes(i)) cls += ' correct';
      else if (ans.includes(i)) cls += ' wrong';
    } else if (pendingMulti.includes(i)) {
      cls += ' selected';
    }
    const onclick = submitted ? '' : `onclick="selectOpt(${i})"`;
    return `<button class="${cls}" ${onclick} ${submitted?'disabled':''}>
      <span class="opt-letter">${LETTERS[i]}</span>
      <span class="opt-text">${txt}</span>
    </button>`;
  }).join('');
  document.getElementById('qOptions').innerHTML = opts;

  // Actions
  let actions = '';
  if (!submitted) {
    actions = `<button class="btn btn-primary" id="submitBtn" onclick="submitAnswer()" disabled>Submit Answer</button>`;
    if (multi > 1) actions += `<span style="color:var(--muted);font-size:.85rem;align-self:center">Select ${multi} answers</span>`;
  } else {
    const resultColor = correct ? 'var(--aws-green)' : 'var(--aws-red)';
    const resultIcon  = correct ? '✓ Correct!' : '✗ Incorrect';
    actions = `<span style="font-weight:700;color:${resultColor};font-size:1rem">${resultIcon}</span>`;
    actions += `<button class="btn btn-outline" onclick="toggleExp()">💡 Explanation</button>`;
  }
  document.getElementById('qActions').innerHTML = actions;

  // Explanation
  const expEl = document.getElementById('qExp');
  expEl.classList.remove('show');
  if (submitted) {
    expEl.innerHTML = `<h4>Explanation</h4><p>${q.exp}</p>` +
      (q.wrong ? `<div class="why-wrong"><strong>Why other options are wrong:</strong><br><p>${q.wrong}</p></div>` : '');
  }

  // Nav buttons
  document.getElementById('btnPrev').disabled = state.idx === 0;
  document.getElementById('btnNext').disabled = state.idx >= filtered.length-1;
  document.getElementById('btnNext').textContent = state.idx >= filtered.length-1 ? 'See Results →' : 'Next →';

  // Flag button
  const flagBtn = document.getElementById('flagBtn');
  flagBtn.classList.toggle('flagged', !!state.flags[q.id]);
  flagBtn.textContent = state.flags[q.id] ? '🚩 Flagged' : '🚩 Flag';

  updateCounters();
}

function selectOpt(i) {
  const q = filtered[state.idx];
  const multi = q.multi ? q.multi : 1;
  if (multi === 1) {
    pendingMulti = [i];
  } else {
    const idx = pendingMulti.indexOf(i);
    if (idx >= 0) pendingMulti.splice(idx, 1);
    else if (pendingMulti.length < multi) pendingMulti.push(i);
  }
  // Update button visuals
  document.querySelectorAll('.opt').forEach((btn, index) => {
    btn.classList.toggle('selected', pendingMulti.includes(index));
  });
  // Enable submit when enough selected
  const submitBtn = document.getElementById('submitBtn');
  if (submitBtn) submitBtn.disabled = pendingMulti.length !== multi;
}

function submitAnswer() {
  if (pendingMulti.length === 0) return;
  const q = filtered[state.idx];
  state.answers[q.id] = pendingMulti.slice();
  save();
  renderQ();
}

function toggleExp() {
  document.getElementById('qExp').classList.toggle('show');
}

function nextQ() {
  if (state.idx >= filtered.length-1) {
    showSummary();
    return;
  }
  state.idx++;
  save();
  renderQ();
}

function prevQ() {
  if (state.idx > 0) {
    state.idx--;
    save();
    renderQ();
  }
}

function toggleFlag() {
  const q = filtered[state.idx];
  state.flags[q.id] = !state.flags[q.id];
  save();
  renderQ();
}

// ── Summary ───────────────────────────────────────────────────────────────────
function showSummary() {
  const domains = ['Domain 1','Domain 2','Domain 3','Domain 4','Domain 5'];
  const domainColors = ['#FF9900','#1A73E8','#D73A49','#2EA44F','#9B59B6'];
  let totalC=0, totalQ=0;
  const domStats = {};
  QUESTIONS.forEach(q => {
    const ans = state.answers[q.id];
    if (!domStats[q.domain]) domStats[q.domain] = {c:0,t:0};
    domStats[q.domain].t++;
    totalQ++;
    if (ans && isCorrect(q,ans)) { domStats[q.domain].c++; totalC++; }
  });
  const pct = totalQ>0 ? Math.round(totalC/totalQ*100) : 0;
  const color = pct>=72?'var(--aws-green)':pct>=60?'var(--aws-orange)':'var(--aws-red)';
  const msg = pct>=72?'🎉 Passing Score! Keep it up!':pct>=60?'📚 Almost there — review flagged topics':'💪 More practice needed — focus on weak domains';
  document.getElementById('overallScore').innerHTML = `
    <div class="big-num" style="color:${color}">${pct}%</div>
    <p>${totalC} / ${totalQ} questions correct</p>
    <p class="pass-msg">${msg}</p>`;
  document.getElementById('domainScores').innerHTML = domains.map((d,i) => {
    const s = domStats[d] || {c:0,t:1};
    const dp = Math.round(s.c/s.t*100);
    const dc = dp>=72?'var(--aws-green)':dp>=60?'var(--aws-orange)':'var(--aws-red)';
    return `<div class="ds-card">
      <div class="pct" style="color:${dc}">${dp}%</div>
      <div class="dlbl">${d}<br><small>${s.c}/${s.t}</small></div>
      <div class="bar"><div class="bar-fill" style="width:${dp}%;background:${dc}"></div></div>
    </div>`;
  }).join('');
  document.getElementById('summaryModal').classList.add('show');
}

function closeSummary() {
  document.getElementById('summaryModal').classList.remove('show');
}

function retakeAll() {
  state.answers = {};
  state.idx = 0;
  shuffled = false;
  shuffleOrder = null;
  state.filter = 'all';
  document.getElementById('shuffleBadge').style.display='none';
  save();
  closeSummary();
  applyFilter();
}

function resetAll() {
  if (!confirm('Reset ALL answers and flags? This cannot be undone.')) return;
  state.answers = {};
  state.flags = {};
  state.idx = 0;
  save();
  applyFilter();
}

// ── Init ──────────────────────────────────────────────────────────────────────
load();
applyFilter();
document.getElementById('summaryModal').addEventListener('click', function(e) {
  if (e.target === this) closeSummary();
});

</script>
