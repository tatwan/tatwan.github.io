<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIP-C01 Practice Exam — 100 Questions</title>
<style>
:root {
  --aws-orange:#FF9900;--aws-dark:#232F3E;--aws-blue:#1A73E8;
  --aws-green:#2EA44F;--aws-red:#D73A49;--bg:#0F1117;--surface:#1A1D27;
  --surface2:#242736;--border:#2D3142;--text:#E6E8F0;--muted:#8892A4;
  --correct:#1B4D2E;--correct-border:#2EA44F;--wrong:#4D1B1B;--wrong-border:#D73A49;
  --selected:#1A2E4D;--selected-border:#1A73E8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}
button{color:inherit;font-family:inherit}
.header{background:linear-gradient(135deg,var(--aws-dark),#1a2744);padding:1.2rem 2rem;border-bottom:2px solid var(--aws-orange);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem}
.header h1{font-size:1.3rem;font-weight:700;color:#fff}.header h1 span{color:var(--aws-orange)}
.badge{background:var(--aws-orange);color:#000;font-weight:700;padding:.2rem .7rem;border-radius:20px;font-size:.8rem}
.main{max-width:900px;margin:0 auto;padding:1.5rem}
.filter-bar{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem;background:var(--surface);padding:1rem;border-radius:10px;border:1px solid var(--border)}
.filter-bar label{color:var(--text);font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;width:100%}
.fbtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted)!important;padding:.4rem 1rem;border-radius:6px;cursor:pointer;font-size:.85rem;transition:all .15s}
.fbtn:hover{border-color:var(--aws-orange);color:var(--text)}
.fbtn.active{background:var(--aws-orange);border-color:var(--aws-orange);color:#000;font-weight:600}
.stats-bar{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.8rem 1.2rem;flex:1;min-width:120px;text-align:center}
.stat-card .num{font-size:1.6rem;font-weight:700}.stat-card .lbl{font-size:.75rem;color:var(--muted)!important;text-transform:uppercase}
.progress-wrap{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:1rem;margin-bottom:1.5rem}
.progress-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;margin-top:.5rem}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--aws-orange),#FFB347);border-radius:4px;transition:width .4s ease}
.progress-label{display:flex;justify-content:space-between;font-size:.8rem;color:var(--muted)}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.8rem;margin-bottom:1.5rem}
.q-meta{display:flex;gap:.6rem;margin-bottom:1rem;flex-wrap:wrap}
.tag{font-size:.75rem;padding:.2rem .6rem;border-radius:12px;font-weight:600}
.tag-domain{background:#1A2744;color:#7BAEFF;border:1px solid #2D4A8A}
.tag-source{background:#1A3020;color:#5CBA7D;border:1px solid #2E6040}
.tag-multi{background:#3A2000;color:#FFB347;border:1px solid #7A5000}
.q-num{color:var(--muted);font-size:.85rem}
.q-scenario{font-size:1rem;line-height:1.75;color:var(--text);margin-bottom:1.5rem}
.q-scenario strong{color:var(--aws-orange)}
.options{display:flex;flex-direction:column;gap:.7rem}
.opt{display:flex;align-items:flex-start;gap:.9rem;background:var(--surface2);border:1.5px solid var(--border);border-radius:8px;padding:1rem 1.2rem;cursor:pointer;transition:all .15s;text-align:left;width:100%;color:var(--text)}
.opt:hover:not(:disabled){border-color:var(--aws-orange);background:#1E2030}
.opt.selected{border-color:var(--selected-border);background:var(--selected)}
.opt.correct{border-color:var(--correct-border)!important;background:var(--correct)!important}
.opt.wrong{border-color:var(--wrong-border)!important;background:var(--wrong)!important}
.opt-letter{min-width:28px;height:28px;border-radius:50%;background:var(--border);color:var(--text);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;flex-shrink:0}
.opt.selected .opt-letter{background:var(--aws-blue);color:#fff}
.opt.correct .opt-letter{background:var(--aws-green);color:#fff}
.opt.wrong .opt-letter{background:var(--aws-red);color:#fff}
.opt-text{font-size:.9rem;line-height:1.55;color:var(--text)}
.actions{display:flex;gap:.8rem;margin-top:1.2rem;flex-wrap:wrap}
.btn{padding:.7rem 1.6rem;border-radius:8px;font-weight:600;cursor:pointer;border:none;font-size:.9rem;transition:all .15s;color:inherit}
.btn-primary{background:var(--aws-orange);color:#000}.btn-primary:hover{background:#FFB347}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--aws-orange)}
.btn-danger{background:transparent;border:1.5px solid var(--aws-red);color:var(--aws-red)}.btn-danger:hover{background:var(--aws-red);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
.explanation{margin-top:1.2rem;background:#0F1A30;border:1px solid #2D4A8A;border-radius:8px;padding:1.2rem;display:none}
.explanation.show{display:block}
.explanation h4{color:var(--aws-orange);margin-bottom:.6rem;font-size:.9rem;text-transform:uppercase;letter-spacing:.05em}
.explanation p{font-size:.88rem;line-height:1.65;color:#C0C8D8!important}
.explanation .why-wrong{margin-top:.8rem;padding-top:.8rem;border-top:1px solid var(--border)}
.explanation .why-wrong strong{color:var(--aws-red)}
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.nav-info{color:var(--muted);font-size:.85rem}
.flag-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.3rem .8rem;border-radius:6px;cursor:pointer;font-size:.8rem}
.flag-btn.flagged{border-color:#FFB347;color:#FFB347}
.summary-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center}
.summary-modal.show{display:flex}
.summary-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;max-width:600px;width:90%;max-height:85vh;overflow-y:auto;color:var(--text)}
.summary-box h2{text-align:center;margin-bottom:1.5rem;font-size:1.4rem}
.domain-scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1rem;margin-bottom:1.5rem}
.ds-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:1rem;text-align:center;color:var(--text)}
.ds-card .pct{font-size:2rem;font-weight:700}.ds-card .dlbl{font-size:.75rem;color:var(--muted);margin-top:.2rem}
.ds-card .bar{height:6px;background:var(--border);border-radius:3px;margin-top:.5rem;overflow:hidden}
.ds-card .bar-fill{height:100%;border-radius:3px}
.overall-score{text-align:center;padding:1.5rem;background:var(--surface2);border-radius:12px;margin-bottom:1.5rem}
.overall-score .big-num{font-size:3.5rem;font-weight:800}
.overall-score p{color:var(--muted);margin-top:.3rem}
.pass-msg{font-size:1.1rem;font-weight:600;margin-top:.5rem}
.empty{text-align:center;padding:3rem;color:var(--muted)}
.shuffle-badge{background:#1A3020;color:#5CBA7D;border:1px solid #2E6040;padding:.2rem .7rem;border-radius:12px;font-size:.75rem;font-weight:600}
@media(max-width:600px){.main{padding:1rem}.q-card{padding:1.2rem}.opt{padding:.8rem}.btn{padding:.6rem 1rem}}
</style>

.aip-nav-inner{display:flex;align-items:stretch;justify-content:space-between;padding:0 20px;flex-wrap:wrap;gap:0;}

<div class="header">
  <h1>AIP-C01 <span>Practice Exam</span></h1>
  <div style="display:flex;gap:.8rem;align-items:center;flex-wrap:wrap">
    <span style="font-size:0.8rem;color:#aaa;">85 Questions · 5 Domains</span>
    <span id="shuffleBadge" class="shuffle-badge" style="display:none">🔀 Shuffled</span>
  </div>
</div>

<div class="main">
  <!-- Filter Bar -->
  <div class="filter-bar">
    <label>Filter by Domain</label>
    <div id="filterBtns" style="display:flex;flex-wrap:wrap;gap:.4rem"></div>
    <div style="margin-top:.6rem;display:flex;gap:.5rem;flex-wrap:wrap">
      <button class="fbtn" id="btnFlagged" onclick="filterFlagged()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>Flagged (<span id="flagCount">0</span>)</button>
      <button class="fbtn" id="btnMissed" onclick="filterMissed()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>Incorrect (<span id="missedCount">0</span>)</button>
      <button class="fbtn" id="btnUnseen" onclick="filterUnseen()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>Unanswered (<span id="unseenCount">0</span>)</button>
      <button class="fbtn" style="margin-left:auto" onclick="shuffleQuestions()"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-right:4px"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>Shuffle</button>
      <button class="fbtn" onclick="resetAll()" style="color:var(--aws-red);border-color:var(--aws-red)">↺ Reset All</button>
    </div>
  </div>

  <!-- Stats Bar -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="num" id="statTotal" style="color:var(--aws-orange)">0</div>
      <div class="lbl">Showing</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statCorrect" style="color:var(--aws-green)">0</div>
      <div class="lbl">Correct</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statWrong" style="color:var(--aws-red)">0</div>
      <div class="lbl">Incorrect</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statScore" style="color:var(--aws-blue)">—</div>
      <div class="lbl">Score</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span id="progressLabel">Question 1 of <span id="qTotal">0</span></span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <!-- Question Card -->
  <div class="q-card" id="qCard">
    <div class="q-meta" id="qMeta"></div>
    <div class="q-num" id="qNum"></div>
    <div class="q-scenario" id="qScenario"></div>
    <div class="options" id="qOptions"></div>
    <div class="actions" id="qActions"></div>
    <div class="explanation" id="qExp"></div>
  </div>

  <!-- Navigation -->
  <div class="nav-row">
    <button class="btn btn-outline" id="btnPrev" onclick="prevQ()">← Previous</button>
    <div style="display:flex;gap:.5rem;align-items:center">
      <button class="flag-btn" id="flagBtn" onclick="toggleFlag()">🚩 Flag</button>
      <span class="nav-info" id="navInfo"></span>
    </div>
    <button class="btn btn-outline" id="btnNext" onclick="nextQ()">Next →</button>
  </div>
</div>

<!-- Summary Modal -->
<div class="summary-modal" id="summaryModal">
  <div class="summary-box">
    <h2>📊 Results Summary</h2>
    <div class="overall-score" id="overallScore"></div>
    <div class="domain-scores" id="domainScores"></div>
    <div style="text-align:center;display:flex;gap:.8rem;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="closeSummary()">Continue Reviewing</button>
      <button class="btn btn-outline" onclick="retakeAll()">Retake All</button>
      <button class="btn btn-danger" onclick="filterMissed();closeSummary()">Review Incorrect</button>
    </div>
  </div>
</div>

<script>

const QUESTIONS = [{"id": 1, "domain": "Domain 1", "src": "Official", "scenario": "A company runs a question-answering application that uses an Amazon Bedrock knowledge base ingesting documents from multiple S3 buckets. The company needs to monitor the data ingestion process to identify and troubleshoot document processing issues.\n\nWhich solution will meet these requirements?", "opts": ["Configure knowledge base logging with Amazon CloudWatch Logs as the destination. Use CloudWatch Logs Insights to query for failed document processing.", "Enable Amazon CloudWatch Application Signals to automatically detect and alert on knowledge base performance issues.", "Enable AWS CloudTrail to track all API calls that relate to knowledge base operations and document ingestion activities.", "Implement Amazon Bedrock model invocation logging to capture detailed metrics about document processing and embedding generation."], "correct": [0], "exp": "Amazon Bedrock knowledge bases support built-in logging to CloudWatch Logs. The logs track file status during ingestion jobs (RESOURCE_IGNORED, EMBEDDING_FAILED, INDEXING_FAILED). CloudWatch Logs Insights lets you query these logs to find failures.", "wrong": "B: CloudWatch Application Signals monitors application health, not KB ingestion. C: CloudTrail tracks API calls but not document-level processing status. D: Model invocation logging captures inference requests, not KB ingestion."}, {"id": 2, "domain": "Domain 1", "src": "Official", "multi": 2, "scenario": "A company is developing a RAG application using Amazon Bedrock. Initially the application retrieves many relevant documents, but users report that the most relevant information often appears lower in the results. The company wants to improve relevance ranking with MINIMAL operational overhead.\n\nWhich TWO steps will improve the relevance of retrieved results?", "opts": ["Configure Amazon OpenSearch Serverless with Learning to Rank (LTR) plugin for custom relevance scoring.", "Create an Aurora PostgreSQL database with pgvector and a custom similarity scoring algorithm.", "Use Amazon Bedrock reranker models with OpenSearch Service to reorder retrieved results based on semantic relevance.", "Use Amazon SageMaker JumpStart FMs with Amazon Kendra Intelligent Ranking.", "Enable hybrid search in Amazon Bedrock Knowledge Bases to combine keyword and semantic retrieval."], "correct": [2, 4], "exp": "Bedrock reranker models calculate relevance scores between queries and documents and reorder results — purpose-built for this problem with minimal overhead. Hybrid search in Knowledge Bases combines BM25 keyword search with vector semantic search to improve retrieval quality.", "wrong": "A: LTR requires custom model training and maintenance — high overhead. B: Custom pgvector algorithm requires significant development. D: Kendra Intelligent Ranking requires setting up a separate Kendra service."}, {"id": 3, "domain": "Domain 1", "src": "Official", "scenario": "A GenAI developer is building a virtual assistant using an Anthropic Claude model on Amazon Bedrock. The developer wants the application to stop generating output after a specific phrase is generated.\n\nWhich parameter achieves this?", "opts": ["Add the trigger phrase in the user prompt with instructions to stop.", "Use the stop sequences parameter in the inference call to specify a trigger phrase.", "Use the top-k parameter to control the diversity of tokens.", "Use the temperature parameter to control the likelihood of stop generation."], "correct": [1], "exp": "The stop sequences parameter accepts a list of strings. When the model generates any of those strings, it stops generating additional tokens. This is the correct mechanism for controlling where generation ends.", "wrong": "A: Prompt instructions are not reliable for stopping generation deterministically. C: top-k controls vocabulary diversity, not stopping. D: Temperature controls randomness, not stopping points."}, {"id": 4, "domain": "Domain 3", "src": "Official", "multi": 2, "scenario": "A company needs secure authentication for a third-party application using Amazon Bedrock. The solution must integrate with the company's existing identity provider (IdP), maintain comprehensive audit logs of authentication and API calls, and eliminate long-lived credentials.\n\nWhich TWO components should be used?", "opts": ["Configure AWS IAM Identity Center to federate with the corporate IdP and provide temporary credentials for Bedrock API access.", "Use Amazon Cognito Identity Pools to exchange IdP tokens for temporary AWS credentials scoped to Bedrock permissions.", "Create long-lived IAM access keys for the application service account.", "Store AWS credentials in AWS Secrets Manager and rotate every 90 days.", "Use Amazon API Gateway with Lambda authorizers to validate every request."], "correct": [0, 1], "exp": "IAM Identity Center federates with external IdPs (SAML/OIDC) and issues temporary credentials via STS — eliminating long-lived keys. Cognito Identity Pools also exchange IdP tokens for temporary STS credentials. Both provide audit trails via CloudTrail and avoid long-lived credentials.", "wrong": "C: Long-lived access keys violate the requirement to eliminate them. D: Secrets Manager rotation still uses long-lived keys. E: Lambda authorizers don't eliminate long-lived credentials."}, {"id": 5, "domain": "Domain 2", "src": "Official", "scenario": "A company is developing an AI assistant using Amazon Bedrock with multiple guardrails (prompt injection detection, sensitive information filtering, denied topic blocking). When a customer query is blocked, a GenAI developer needs to provide a specific response explaining why the request cannot be processed.\n\nWhich solution meets this requirement?", "opts": ["Configure a custom blocked messages response in the Bedrock Guardrails settings for each guardrail action type.", "Use the trace field in the Converse API response to detect blocked requests, then generate a custom response with a second model call.", "Implement a post-processing Lambda function that checks for guardrail interventions and returns a custom error message.", "Create a separate Bedrock model call with a prompt that explains the rejection based on the original user input."], "correct": [3], "exp": "When Guardrails blocks a request, the API returns an intervention response. The application should then make a separate model call with a prompt explaining why the request cannot be processed and what the user can do instead — this is the recommended pattern for custom blocked-message handling.", "wrong": "A: You can configure default blocked messaging, but custom dynamic responses require application-level logic. B: The trace field shows guardrail state but you still need a second call to generate a response. C: Lambda can detect interventions but the best UX uses another model call for a natural language explanation."}, {"id": 6, "domain": "Domain 2", "src": "Official", "scenario": "A financial services company operates a RAG application for answering questions about internal market analysis reports. The application uses Amazon Bedrock for embeddings, Amazon OpenSearch Service as the vector store, and a Lambda function for retrieval. After upgrades, OpenSearch query latency has increased dramatically.\n\nWhich solution resolves the performance issue with LEAST operational overhead?", "opts": ["Migrate from OpenSearch Service to Amazon Kendra for managed search with ML ranking.", "Increase OpenSearch cluster instance types and add replicas to handle query load.", "Enable Amazon OpenSearch Service Auto-Tune to optimize query performance automatically.", "Implement caching with Amazon ElastiCache to store frequently accessed query results."], "correct": [3], "exp": "ElastiCache can cache the results of frequent queries, dramatically reducing OpenSearch query load and latency. For a RAG application where users often ask similar questions, caching is highly effective and requires minimal changes to the architecture.", "wrong": "A: Kendra migration is complex and changes the entire retrieval architecture. B: Scaling instances addresses capacity but not latency from repeated queries. C: Auto-Tune helps with index settings but may not resolve high query load effectively."}, {"id": 7, "domain": "Domain 3", "src": "Official", "scenario": "A company is implementing AI governance policies requiring all FM interactions to be secured with guardrails. The company configures Amazon Bedrock guardrails and must ensure that ALL InvokeModel and Converse API calls to FMs apply the guardrails, including calls from different teams.\n\nWhich solution enforces guardrails on all invocations?", "opts": ["Create an IAM policy that requires the guardrailIdentifier parameter in all Bedrock API calls.", "Configure the Amazon Bedrock resource-based policy to set a default guardrail for the model.", "Distribute the guardrail ID to all teams and require them to include it in their API calls.", "Use AWS Config rules to detect Bedrock API calls that lack guardrail parameters."], "correct": [1], "exp": "A Bedrock resource-based policy can specify a default guardrail that is automatically applied to all invocations of a model, even if the caller doesn't explicitly include a guardrail ID. This enforces governance centrally without relying on individual teams.", "wrong": "A: IAM policies can require the parameter to be present but cannot enforce specific guardrail IDs. C: Manual distribution relies on human compliance. D: Config detects violations after the fact but doesn't prevent them."}, {"id": 8, "domain": "Domain 1", "src": "Official", "scenario": "A company wants to create an application to analyze fashion trends from videos and photos from public fashion shows. The application must store extracted information and provide a dashboard summarizing trends.\n\nWhich solution meets these requirements?", "opts": ["Use Amazon Rekognition Video to analyze video segments. Store results in DynamoDB. Build a QuickSight dashboard using DynamoDB as the data source.", "Use Amazon Nova Pro to analyze video and image content. Store results in Amazon S3. Use Amazon Athena and QuickSight to build the trends dashboard.", "Use Amazon Transcribe to convert video audio to text. Analyze text with Comprehend. Store in S3 and visualize with QuickSight.", "Use Amazon SageMaker to train a custom image classification model. Deploy the model and store results in RDS. Visualize with QuickSight."], "correct": [1], "exp": "Amazon Nova Pro is a multimodal foundation model that can analyze both video and image content to extract style elements and trends. Storing results in S3 and using Athena with QuickSight is the standard serverless analytics pattern. This is the most comprehensive and managed solution.", "wrong": "A: Rekognition Video detects objects/labels but lacks the semantic understanding needed for trend analysis. C: Audio transcription misses visual fashion elements. D: Custom model training adds significant operational overhead."}, {"id": 9, "domain": "Domain 1", "src": "Official", "scenario": "A company is building a diagnostic imaging application that needs to perform similarity searches across 50 million images to assist with diagnosing patients. The application processes new images daily and performs similarity searches infrequently (when a user submits a query).\n\nWhich vector store is MOST appropriate?", "opts": ["Amazon OpenSearch Serverless with k-NN plugin", "Amazon Aurora PostgreSQL with pgvector extension", "Amazon S3 Vectors", "Amazon MemoryDB for Redis with vector search"], "correct": [2], "exp": "Amazon S3 Vectors is designed for large-scale vector storage at low cost. With 50 million images, batch daily ingestion, and infrequent queries, S3 Vectors provides the lowest cost storage. It's purpose-built for this kind of large-scale, read-light workload.", "wrong": "A: OpenSearch Serverless is great for frequent queries but costs more for large, infrequent-query workloads. B: Aurora pgvector is better for operational databases with frequent transactional access. D: MemoryDB is in-memory (expensive at 50M vectors) and optimized for high-throughput real-time access."}, {"id": 10, "domain": "Domain 2", "src": "Official", "multi": 2, "scenario": "A GenAI developer deployed a fine-tuned LLM on a SageMaker AI endpoint with DJL continuous batching on GPU instances (8 GPUs each). As concurrency increases beyond 50 requests, latency increases sharply. CPU utilization is low but GPU utilization fluctuates between 40-95%.\n\nWhich TWO actions will improve throughput under high concurrency?", "opts": ["Increase the number of model replicas by adding more endpoint instances.", "Enable multi-model deployment by loading multiple model copies on the same GPU instances.", "Configure tensor parallelism to shard model layers across all 8 GPUs of each instance.", "Reduce the max tokens parameter to limit generation length per request.", "Switch from continuous batching to static batching for more predictable throughput."], "correct": [1, 3], "exp": "B: Multi-model deployment / inference components allow loading multiple copies of the model across the 8 GPUs, increasing throughput. D: Reducing max_tokens decreases per-request GPU time, allowing more requests to be processed in parallel. Both address the GPU utilization bottleneck.", "wrong": "A: More instances help but are expensive; the 8 GPUs per instance aren't fully utilized. C: Tensor parallelism splits one model across GPUs for large models that don't fit on one GPU — not the issue here. E: Static batching has worse latency characteristics."}, {"id": 11, "domain": "Domain 2", "src": "Official", "scenario": "A financial services company wants to develop a mobile app for account inquiries. They have a large amount of email exchange data between customers and support staff stored in S3. The model must understand the specific language and style used by the company's support team.\n\nWhich approach is MOST appropriate?", "opts": ["Create a Bedrock Knowledge Base from the email data and use RAG to retrieve relevant past conversations.", "Fine-tune a foundation model using the email exchange data to learn the company's communication style and terminology.", "Use prompt engineering with few-shot examples from the email data in the system prompt.", "Deploy Amazon Q Business with the email data as a data source."], "correct": [1], "exp": "Fine-tuning is the right choice when you need the model to learn a specific communication style, tone, and terminology — not just retrieve factual information. The email exchanges teach the model how support staff communicate, which is a style/behavior change best addressed by fine-tuning.", "wrong": "A: RAG retrieves relevant information but doesn't teach the model to adopt the support team's communication style. C: Few-shot prompting has token limits and can't encode all the style patterns in a large dataset. D: Amazon Q Business is for enterprise search/Q&A, not style adaptation."}, {"id": 12, "domain": "Domain 1", "src": "Official", "scenario": "An ecommerce company has a Bedrock application generating product descriptions. During peak periods, the application receives throttling errors: 'ThrottlingException: Too many requests'. The application runs in a single AWS Region.\n\nWhich solution resolves the throttling with LEAST architectural changes?", "opts": ["Implement exponential backoff and retry logic in the application.", "Configure an Amazon Bedrock cross-region inference profile to automatically route requests across multiple regions.", "Deploy a second instance of the application in a different AWS Region with Route 53 failover.", "Request a service quota increase for the model in the current region."], "correct": [1], "exp": "Cross-region inference profiles automatically distribute inference requests across configured regions. When one region is throttled, requests route to another region seamlessly. This is the recommended AWS solution for throttling without architectural changes.", "wrong": "A: Retry logic handles transient failures but doesn't resolve sustained throttling. C: Routing a separate deployment requires significant architectural changes. D: Quota increases help but have limits and are not immediately granted."}, {"id": 13, "domain": "Domain 2", "src": "Official", "multi": 2, "scenario": "A financial services company needs prompt templates to be governed through approval workflows. The company requires version control for templates and the ability to roll back to previous versions if issues occur in production.\n\nWhich TWO components meet these requirements?", "opts": ["Use Amazon Bedrock Prompt Management to create, version, and share prompt templates across teams.", "Store prompt templates in AWS CodeCommit with branch protection rules for approval.", "Implement an AWS Step Functions workflow for prompt approval before deployment.", "Tag prompt versions in Bedrock Prompt Management and use IAM policies to restrict production access to approved versions.", "Use Amazon DynamoDB to store prompt versions with a status field for approval tracking."], "correct": [0, 3], "exp": "Bedrock Prompt Management provides native version control for prompts, including creating versions, tagging them, and managing their lifecycle. IAM policies can restrict which versions are accessible in production. This gives governance and rollback without custom infrastructure.", "wrong": "B: CodeCommit adds operational overhead and doesn't integrate natively with Bedrock. C: Step Functions can orchestrate approvals but requires custom build. E: DynamoDB requires custom development."}, {"id": 14, "domain": "Domain 5", "src": "Official", "multi": 2, "scenario": "An education company built a content generation system that generates practice questions. Reviewers must approve question-response pairs before they are published. The system must track which pairs have been approved.\n\nWhich TWO components implement this review workflow?", "opts": ["Amazon Bedrock model evaluation with an automated LLM judge", "Amazon Augmented AI (A2I) for human review workflows with custom worker task UI", "Amazon SageMaker Ground Truth for human labeling of question quality", "AWS Step Functions to orchestrate the approval pipeline and track state", "Amazon Bedrock Flows to route question pairs to reviewers automatically"], "correct": [1, 3], "exp": "Amazon A2I (Augmented AI) is specifically designed for human review workflows — it creates review tasks, routes them to workers, and records decisions. Step Functions orchestrates the overall pipeline and tracks approval state. Together they create a managed approval workflow.", "wrong": "A: Model evaluation is for automated assessment, not human approval workflows. C: Ground Truth is for annotation/labeling tasks, not approval workflows. E: Bedrock Flows orchestrates AI workflows but lacks human task management."}, {"id": 15, "domain": "Domain 2", "src": "Official", "multi": 2, "scenario": "A financial services company needs to deploy existing Python agent code to Amazon Bedrock AgentCore Runtime. The company wants to reduce infrastructure management overhead and the agent must scale from 0 to thousands of concurrent sessions.\n\nWhich TWO actions should be taken?", "opts": ["Package the Python agent as a Docker container and push to Amazon ECR.", "Deploy the agent directly from source code on an EC2 instance fleet.", "Register the container with Amazon Bedrock AgentCore Runtime as a custom agent.", "Configure an ECS Fargate cluster with auto-scaling policies.", "Use AWS Lambda to host the agent code with Lambda container image support."], "correct": [0, 2], "exp": "AgentCore Runtime runs containerized agents — you package your Python agent as a Docker container, push to ECR, then register it with AgentCore Runtime. AgentCore handles the scaling (0 to thousands), session management, and infrastructure automatically.", "wrong": "B: EC2 fleet requires significant infrastructure management. D: ECS Fargate is an option but adding AgentCore Runtime removes the need to manage ECS. E: Lambda has execution time limits unsuitable for long-running agent sessions."}, {"id": 16, "domain": "Domain 2", "src": "Official", "scenario": "A news media company wants a content conformance tool that reviews articles in real time when journalists click 'Analyze'. The tool should provide analysis of the article content against a style guide and return results immediately.\n\nWhich architecture meets these requirements?", "opts": ["Use Amazon Bedrock Flows with a prompt node to analyze article content against the style guide and stream results back to the journalist's browser.", "Build a Step Functions workflow triggered by API Gateway that calls Bedrock and writes results to S3 for polling.", "Deploy a Lambda function that calls Bedrock InvokeModelWithResponseStream and streams results via API Gateway WebSocket.", "Use Amazon Bedrock Agents with an action group that reads the style guide from a Knowledge Base and returns analysis."], "correct": [2], "exp": "Lambda with InvokeModelWithResponseStream and API Gateway WebSocket provides real-time streaming to the browser. This is the recommended pattern for streaming generative AI responses to web clients with immediate interactive feedback.", "wrong": "A: Bedrock Flows can orchestrate the analysis but streaming to browser requires WebSocket integration. B: S3 polling creates user-facing latency. D: Agents add orchestration overhead for what is a single analysis task."}, {"id": 17, "domain": "Domain 2", "src": "Official", "scenario": "A GenAI developer needs to deploy a pre-trained Hugging Face image generation model tested on SageMaker JumpStart. The model must serve users on demand. The solution must minimize cost when there are no active requests.\n\nWhich deployment option is MOST cost-efficient?", "opts": ["Deploy to a SageMaker real-time inference endpoint with auto-scaling set to scale to 0 instances.", "Deploy to a SageMaker asynchronous inference endpoint that scales to 0 when idle.", "Deploy to an EC2 GPU instance with auto-start via Lambda trigger.", "Deploy to SageMaker Serverless Inference."], "correct": [1], "exp": "SageMaker Asynchronous Inference supports scale-to-zero when no requests are queued, meaning you pay nothing during idle periods. For on-demand image generation (which can take seconds to minutes), async inference with scale-to-zero is ideal.", "wrong": "A: Real-time endpoints can scale to 1 minimum but true scale-to-zero isn't standard for real-time. C: EC2 auto-start has cold start latency and more management overhead. D: Serverless Inference has memory/timeout limits that may not support large image generation models."}, {"id": 18, "domain": "Domain 1", "src": "Official", "scenario": "A company uses an AI assistant to answer questions based on internal documents. The company wants to include new documents in responses as soon as possible and exclude deleted documents as soon as possible. The documents are stored in S3 and updated continuously.\n\nWhich solution meets these requirements?", "opts": ["Schedule the Bedrock Knowledge Base sync job to run every 5 minutes using Amazon EventBridge.", "Configure S3 Event Notifications to trigger a Lambda function that starts an incremental knowledge base sync whenever documents are added or deleted.", "Enable Bedrock Knowledge Base auto-sync which detects S3 changes within 5 minutes.", "Use S3 Object Lambda to intercept read requests and filter deleted documents."], "correct": [2], "exp": "Amazon Bedrock Knowledge Bases supports automated sync triggered by S3 events. When S3 event notifications are configured, the Knowledge Base can be automatically synced whenever documents change — this is the recommended approach for near-real-time updates with minimal operational overhead.", "wrong": "A: EventBridge scheduling introduces delay (up to 5 min) even for immediate changes. B: Custom Lambda + sync job works but has more operational overhead than built-in event-driven sync. D: S3 Object Lambda doesn't update the vector store."}, {"id": 19, "domain": "Domain 2", "src": "Official", "multi": 2, "scenario": "A cross-functional team is developing a generative AI application by using AWS services. The team needs to optimize developer productivity and enforce consistent integration patterns. They need to automate performance tuning and accelerate AI testing across multiple business units.\n\nWhich TWO services should they use?", "opts": ["Amazon Bedrock Guardrails to standardize content filtering across all teams", "Amazon Q Developer to assist developers with code generation and testing", "AWS Lambda Powertools for standardized logging and tracing", "Amazon Bedrock Studio for collaborative prompt engineering", "Amazon Q Developer Transformation to automate application modernization and testing"], "correct": [1, 4], "exp": "Amazon Q Developer provides AI-powered coding assistance (code generation, review, debugging) to boost developer productivity. Amazon Q Developer Transformation automates large-scale code modernization and testing — both accelerate development workflows across business units.", "wrong": "A: Guardrails is for content safety, not developer productivity. C: Powertools is useful but doesn't accelerate AI testing. D: Bedrock Studio is a console feature, not a developer productivity service."}, {"id": 20, "domain": "Domain 1", "src": "Domain 1 Prep", "scenario": "A company is developing a natural language search for an archive of 250,000 video files based on video metadata. The company will generate transcripts using Amazon Transcribe and create a Bedrock Knowledge Base for natural language search. The company also needs to process video scenes.\n\nWhich solution meets these requirements with LEAST operational overhead?", "opts": ["Use Amazon Rekognition Video to cut videos into scene clips. Use Amazon Nova Lite for batch inference on Bedrock to process transcripts and scene videos to create scene-based metadata.", "Run a SageMaker Processing job with scikit-learn to cut videos into scenes. Use Amazon Nova Lite on-demand inference to create scene metadata.", "Use Amazon Rekognition Video to cut videos. Use Amazon Nova Micro for batch inference on Bedrock. Process transcripts and scene clips to create metadata.", "Run a SageMaker Processing job with scikit-learn to cut videos. Use Amazon Nova Micro on-demand inference to create scene metadata."], "correct": [0], "exp": "Rekognition Video is a fully managed service specifically designed for video scene detection. Nova Lite is a multimodal model (supports video) and batch inference reduces cost. Knowledge Bases provides the fully managed RAG layer. All managed services with minimal operational overhead.", "wrong": "B: SageMaker Processing jobs require custom video processing code; scikit-learn doesn't handle video. C: Nova Micro is text-only and does not support video modality. D: Both wrong for the same reasons as B and C."}, {"id": 21, "domain": "Domain 1", "src": "Domain 1 Prep", "scenario": "A company is building a conversational AI application using Amazon Nova Pro on Bedrock. The application requires high availability across multiple regions to ensure continuous operation. During peak traffic, requests are throttled.\n\nWhich solution provides high availability with automatic failover?", "opts": ["Create an Amazon Bedrock inference profile with primary and secondary Region configurations to automatically route requests when throttled.", "Use Bedrock cross-Region inference to route requests in a round-robin pattern across Regions.", "Configure Amazon Route 53 latency-based routing with health checks to distribute Bedrock API requests.", "Deploy Bedrock in multiple Regions and use AWS Global Accelerator with custom endpoint routing."], "correct": [0], "exp": "Amazon Bedrock inference profiles let you define a group of Regions. When one Region is throttled, Bedrock automatically routes requests to the next configured Region. This is the purpose-built HA solution for Bedrock with automatic failover and minimal overhead.", "wrong": "B: Round-robin routing doesn't provide automatic failover on throttling. C: Route 53 requires custom health check logic for Bedrock throttling detection. D: Global Accelerator routes network traffic at the TCP level, not at the application API level."}, {"id": 22, "domain": "Domain 1", "src": "Domain 1 Prep", "scenario": "A research company is building a GenAI-powered assistant using Amazon Bedrock. The assistant must answer questions about research papers stored in S3. The solution must minimize infrastructure management and provide source citations.\n\nWhich solution meets these requirements?", "opts": ["Create an Amazon Bedrock knowledge base connecting to S3 as the data source. Enable citations in the retrieval configuration.", "Deploy a SageMaker AI model as a custom FM. Build a retrieval layer using Amazon OpenSearch. Implement citation tracking in the application.", "Use a Bedrock Agent with action groups that call Lambda functions to search S3 with Athena queries.", "Generate embeddings from documents using Bedrock. Store in RDS Aurora. Build a custom retrieval API."], "correct": [0], "exp": "Amazon Bedrock Knowledge Bases is the fully managed RAG solution — it handles document ingestion, chunking, embedding, and retrieval from S3. Citations (source document references) are built-in. This is the minimal-overhead solution.", "wrong": "B: Custom FM deployment and manual OpenSearch integration require significant infrastructure management. C: Lambda/Athena can search text but lacks semantic search capabilities. D: Custom embedding and retrieval pipeline is maximum overhead."}, {"id": 23, "domain": "Domain 1", "src": "Domain 1 Prep", "scenario": "A GenAI developer is building an information discovery application. The application must retrieve and analyze information from multiple data sources: an internal knowledge base, a public API, and a real-time database. The developer needs a solution to orchestrate retrieval from all three sources.\n\nWhich solution meets these requirements?", "opts": ["Create a Bedrock Agent with a Knowledge Base for the internal knowledge base, and action groups with Lambda functions for the public API and real-time database.", "Use Bedrock Knowledge Bases with S3 as the data source and embed API call results daily.", "Create a Lambda function that queries all three sources and concatenates results before sending to the model.", "Use Bedrock Flows with nodes for each data source connected sequentially."], "correct": [0], "exp": "Bedrock Agents can combine Knowledge Bases (for the internal KB), action groups with Lambda functions (for the public API and real-time database), and orchestrate retrieval from all sources dynamically. This is the purpose-built multi-source orchestration pattern.", "wrong": "B: Embedding API results daily creates stale data and doesn't support real-time DB. C: Custom Lambda orchestration works but doesn't have the built-in reasoning and dynamic routing of an Agent. D: Flows for sequential processing doesn't dynamically decide which sources to query."}, {"id": 24, "domain": "Domain 1", "src": "Domain 1 Prep", "scenario": "A company wants to build a document search tool that searches across PDF, Word, and HTML documents. The tool must return the most relevant results ranked by semantic relevance. The company wants to minimize custom development.\n\nWhich solution is MOST appropriate?", "opts": ["Create an Amazon Bedrock Knowledge Base with S3 as the data source. Enable semantic search with Amazon OpenSearch Serverless as the vector store.", "Use Amazon Kendra to index and search the documents with ML-ranked results.", "Build a custom Lambda function that uses Amazon Comprehend to extract key phrases and stores them in DynamoDB for keyword search.", "Use Amazon OpenSearch Service with a keyword-based full-text search index."], "correct": [0], "exp": "Bedrock Knowledge Bases supports PDF, Word (DOCX), and HTML documents natively. With OpenSearch Serverless as the vector store, it provides semantic search with minimal custom development. Bedrock handles all parsing, chunking, and embedding automatically.", "wrong": "B: Kendra is an enterprise search service but doesn't integrate as directly with Bedrock for generative responses with citations. C: Comprehend key phrases provide keyword search, not semantic search. D: OpenSearch keyword search lacks semantic understanding."}, {"id": 25, "domain": "Domain 2", "src": "Domain 2 Prep", "scenario": "A financial services company builds a customer service AI assistant using Amazon Bedrock. The assistant needs to perform specific actions: checking account balances, processing transactions, and retrieving customer information via internal APIs. The solution must be highly scalable, maintain a decoupled architecture, and provide flexibility to use different tools dynamically.\n\nWhich solution meets these requirements?", "opts": ["Create an Amazon Bedrock Flow with sequential steps for LLM invocations and Lambda function calls with predefined paths for each request type.", "Enhance an existing Lambda function with the ReAct framework, implementing all tool access logic within the same function.", "Develop an AWS Step Functions workflow that orchestrates LLM-tool interaction with fixed state machine transitions.", "Create an agent using the AWS Strands SDK. Create MCP servers for each company API. Register the MCP servers as action groups in a Bedrock Agent."], "correct": [3], "exp": "The AWS Strands SDK enables building agents with MCP (Model Context Protocol) integration. MCP servers expose tools via a standardized protocol, and Bedrock Agents with MCP-based action groups provide dynamic tool selection at runtime — exactly meeting the decoupled, scalable, flexible requirements.", "wrong": "A: Bedrock Flows uses predefined paths, not dynamic tool selection. B: Single Lambda with all logic is tightly coupled and doesn't scale independently. C: Step Functions state machine has fixed transitions, not dynamic tool selection."}, {"id": 26, "domain": "Domain 2", "src": "Domain 2 Prep", "scenario": "A company develops a customer service chatbot using Amazon Nova Micro. The traffic pattern is highly unpredictable — some days have 10 requests, others have 10,000. The company wants to minimize cost.\n\nWhich deployment model is MOST cost-effective?", "opts": ["Deploy on Bedrock with Provisioned Throughput using a 1-month commitment for cost savings.", "Deploy on Bedrock and invoke the model using Lambda with on-demand pricing.", "Deploy on SageMaker AI real-time endpoints with auto-scaling.", "Deploy on SageMaker Asynchronous Inference with queue-based processing."], "correct": [1], "exp": "For unpredictable traffic, on-demand pricing in Bedrock (pay per token) with Lambda invocations is the most cost-effective. You pay only for what you use with no minimum commitment. Provisioned Throughput guarantees capacity but charges even when idle — wasteful for unpredictable traffic.", "wrong": "A: Provisioned Throughput requires a commitment and charges for unused capacity during low-traffic periods. C: SageMaker real-time endpoints charge per instance-hour whether idle or busy. D: Async inference has per-instance costs and is for long-running jobs."}, {"id": 27, "domain": "Domain 2", "src": "Domain 2 Prep", "scenario": "A GenAI developer is building a document processing system using Amazon Bedrock FMs for extraction. Client browsers must upload large documents (up to 50 MB) directly. The solution must be secure and scalable.\n\nWhich solution meets these requirements?", "opts": ["Store documents in S3 with versioning. Deploy API Gateway with Lambda proxy to receive file uploads and forward to S3.", "Store documents in S3 with versioning. Set up API Gateway to invoke Lambda that uploads files to S3 on behalf of clients.", "Use Amazon S3 pre-signed URLs to upload documents directly to S3 with versioning. Use Lambda to trigger Bedrock processing after upload.", "Implement WebSocket APIs through API Gateway to maintain client connections during document upload."], "correct": [2], "exp": "S3 pre-signed URLs allow clients to upload large files directly to S3 without routing through Lambda or API Gateway — avoiding payload size limits and reducing latency. Lambda is then triggered by S3 events to process the document with Bedrock. This is the scalable, secure, recommended pattern.", "wrong": "A: Routing large file uploads through Lambda hits the 6 MB payload limit. B: Same issue — Lambda proxying for large files is inefficient. D: WebSockets are for real-time bidirectional communication, not file uploads."}, {"id": 28, "domain": "Domain 2", "src": "Domain 2 Prep", "scenario": "A healthcare company needs both batch processing (nightly reports) and real-time inference (patient queries) from the same Bedrock application. Batch jobs process thousands of records nightly. Real-time queries require sub-2-second response times.\n\nWhich architecture meets BOTH requirements?", "opts": ["Use Bedrock on-demand inference for both use cases with concurrent Lambda functions for batch jobs.", "Use SageMaker real-time endpoints for both batch and real-time with auto-scaling.", "Use Bedrock batch inference jobs for nightly batch processing and on-demand inference with Lambda for real-time queries.", "Use SageMaker Batch Transform for batch processing and SageMaker real-time endpoints for queries."], "correct": [2], "exp": "Bedrock batch inference jobs are optimized for large-scale batch processing at lower cost. On-demand inference with Lambda handles real-time queries within the SLA. This combination uses purpose-built services for each workload type.", "wrong": "A: On-demand Lambda invocations for batch processing is inefficient and costly compared to batch inference. B: SageMaker endpoints require instance management for both workloads. D: SageMaker requires more infrastructure management than Bedrock's managed API."}, {"id": 29, "domain": "Domain 2", "src": "Domain 2 Prep", "multi": 2, "scenario": "A media company needs to orchestrate a content creation pipeline: research phase (web search), drafting phase (generate draft), and review phase (human approval). The pipeline must track state, handle failures with retries, and wait for human approval.\n\nWhich TWO services should be used?", "opts": ["AWS Step Functions for pipeline orchestration with built-in retry and human approval via waitForTaskToken", "Amazon Bedrock Flows for the AI generation steps within the pipeline", "Amazon SQS to queue tasks between pipeline stages", "Amazon EventBridge to trigger each phase sequentially", "AWS Batch for the research and drafting compute phases"], "correct": [0, 1], "exp": "Step Functions orchestrates the overall pipeline with retry logic and can pause for human approval using .waitForTaskToken. Bedrock Flows handles the AI generation steps (research + drafting) within the pipeline. Together they provide a fully managed, stateful pipeline.", "wrong": "C: SQS decouples stages but doesn't track state or handle complex retry logic. D: EventBridge triggers are event-driven, not stateful pipeline orchestration. E: AWS Batch is for HPC/container jobs, not AI pipeline orchestration."}, {"id": 30, "domain": "Domain 3", "src": "Domain 3 Prep", "scenario": "A financial services company creates a text generation model for loan processing. The company must implement comprehensive bias evaluation across demographic groups (gender, race, profession, age) with automated assessment, secondary model validation, continuous monitoring with alerting, and human review workflows.\n\nWhich solution meets these requirements?", "opts": ["Create Amazon Bedrock model evaluation jobs using the BOLD dataset. Configure secondary model validation with an evaluator model. Set up CloudWatch custom metrics for bias tracking. Use Bedrock Prompt Management for controlled prompt variant testing.", "Deploy SageMaker Clarify processing jobs using the RealToxicityPrompts dataset. Configure bias detection for demographic analysis. Set up SageMaker Model Monitor with custom Lambda for bias reporting.", "Configure Bedrock Knowledge Bases evaluations using the WikiText2 dataset. Use RAG-based bias assessment. Set up Bedrock Flows for prompt optimization with CloudWatch Evidently.", "Set up SageMaker Ground Truth labeling jobs using the T-REx dataset. Deploy a custom bias detection model. Use SNS for alerting."], "correct": [0], "exp": "The BOLD (Bias in Open-Ended Language Generation) dataset is specifically designed for demographic bias assessment. Bedrock model evaluation supports secondary model validation (LLM-as-judge). CloudWatch metrics + alarms provide automated threshold alerting. Prompt Management enables controlled A/B testing of prompt variants.", "wrong": "B: RealToxicityPrompts measures toxicity, not demographic bias. Clarify doesn't support secondary model validation for GenAI. C: WikiText2 measures general text generation quality, not fairness. D: T-REx is for knowledge verification, not bias evaluation."}, {"id": 31, "domain": "Domain 3", "src": "Domain 3 Prep", "scenario": "A company stores customer data in Amazon S3. The company wants to automatically identify and classify PII data in real time as customers submit information through a form. The solution must work in real time and identify specific entity types (SSN, email, phone).\n\nWhich solution is MOST appropriate?", "opts": ["Deploy AWS Glue Data Quality rules with regex patterns for PII detection across S3 buckets.", "Implement the Amazon Comprehend real-time PII detection API. Configure entity types to detect (SSN, email, phone). Implement redaction in the application layer.", "Use Amazon Comprehend batch PII detection jobs for monthly scans of S3 buckets.", "Deploy Amazon Comprehend custom entity recognition models trained on company-specific PII patterns."], "correct": [1], "exp": "Amazon Comprehend's real-time PII detection API can identify specific entity types (SSN, email, phone, credit cards) synchronously. For real-time form submissions, the application calls Comprehend to detect and redact PII before storage. This is the managed, real-time PII detection solution.", "wrong": "A: Glue Data Quality is for batch data quality checks, not real-time PII detection. C: Monthly batch scans are not real-time. D: Custom entity recognition requires training data and ML expertise for entities already supported by standard Comprehend."}, {"id": 32, "domain": "Domain 3", "src": "Domain 3 Prep", "scenario": "A company deployed a document summary system using Bedrock Guardrails, AWS Lake Formation, and IAM policies. Some documents are being summarized without the expected guardrails being applied. A security engineer needs to identify which requests bypass guardrails.\n\nWhich action should the engineer take FIRST?", "opts": ["Analyze Amazon Bedrock model invocation logs to identify requests that bypass guardrails and examine the API calls for guardrail parameters.", "Review IAM policies for Bedrock service role permissions. Use CloudWatch to search for denied requests.", "Investigate application code for SDK configuration issues. Examine PII filter rules.", "Audit Lake Formation data permissions for privilege escalation. Create AWS Config rules."], "correct": [0], "exp": "Model invocation logs record all Bedrock API calls including whether guardrails were applied. Analyzing these logs shows which requests included the guardrailIdentifier parameter and which didn't — identifying the bypass. This is the first diagnostic step.", "wrong": "B: IAM policies control access but don't show which requests bypassed guardrails in the logs. C: Code review is a later step after log analysis confirms the pattern. D: Lake Formation controls data access, not guardrail application."}, {"id": 33, "domain": "Domain 3", "src": "Domain 3 Prep", "scenario": "A company uses Amazon Bedrock to generate SQL queries from natural language. The generated SQL executes against a production database. The company must prevent SQL injection and ensure queries only access approved tables.\n\nWhich solution provides MOST comprehensive protection?", "opts": ["Use Bedrock Guardrails with denied topics configured to block SQL injection patterns. Apply IAM policies limiting the database user to approved tables.", "Implement input validation with AWS WAF before queries reach Bedrock. After generation, parse and validate SQL with a Lambda function. Use a least-privilege database user.", "Use prompt engineering to instruct the model not to generate harmful SQL. Monitor with CloudWatch for anomalous queries.", "Enable Bedrock Guardrails contextual grounding checks with database schema as the knowledge base."], "correct": [0], "exp": "Denied topics in Guardrails can block injection patterns in the input. IAM / least-privilege DB users ensure that even if malicious SQL is generated, it can't access unauthorized tables. Defense-in-depth at the guardrail + database permission layer.", "wrong": "B: WAF + Lambda validation adds more layers but WAF is for HTTP-level attacks. The combination with least-privilege DB user is strong but denied topics in Guardrails is purpose-built for this. C: Prompt engineering alone is insufficient for security-critical systems. D: Contextual grounding checks verify factual alignment, not SQL safety."}, {"id": 34, "domain": "Domain 3", "src": "Domain 3 Prep", "scenario": "A company needs to implement data encryption for their Amazon Bedrock Knowledge Base to satisfy compliance requirements. The compliance team requires customer-managed KMS keys (CMK) and the ability to revoke access.\n\nWhich configuration is required?", "opts": ["Enable S3 SSE-KMS on the data source bucket only.", "Specify a customer-managed KMS key when creating the knowledge base AND configure the KMS key policy to allow the Bedrock service role.", "Use AWS-managed keys (aws/s3) for automatic rotation without additional configuration.", "Enable Bedrock model invocation logging encryption with CMK and link it to the knowledge base."], "correct": [1], "exp": "To use CMK encryption with Bedrock Knowledge Bases, you must: (1) specify the CMK ARN when creating the KB, and (2) configure the KMS key policy to grant the Bedrock service role decrypt/encrypt permissions. Both steps are required — the KB creation fails if the key policy doesn't allow access.", "wrong": "A: S3 SSE-KMS protects source data in S3 but not the KB vector store. C: AWS-managed keys don't support customer-controlled revocation. D: Invocation logging encryption is separate from KB encryption."}, {"id": 35, "domain": "Domain 4", "src": "Domain 4 Prep", "scenario": "A company builds a chat-based AI application using Amazon Nova Pro on Bedrock. The application achieves high accuracy but costs are high. A GenAI developer plans to perform model distillation to reduce cost while maintaining accuracy. The developer will use invocation logs from CloudWatch Logs and wants Amazon Bedrock to apply proprietary data synthesis techniques.\n\nWhich solution meets these requirements?", "opts": ["Use Amazon Nova Premier as the student model. Specify Bedrock to use prompt-response pairs from the invocation logs.", "Use Amazon Nova Premier as the student model. Specify Bedrock to use only prompts from the invocation logs.", "Use Amazon Nova Lite as the student model. Specify Bedrock to use prompt-response pairs from the invocation logs.", "Use Amazon Nova Lite as the student model. Specify Bedrock to use only prompts from the invocation logs."], "correct": [3], "exp": "Model distillation transfers knowledge from a large (teacher) model to a smaller (student) model. Nova Lite is appropriately smaller than Nova Pro for cost reduction. For Bedrock's proprietary data synthesis techniques, you must provide only prompts — not prompt-response pairs. Bedrock generates high-quality synthetic responses using its own techniques.", "wrong": "A & B: Nova Premier is larger than/comparable to Nova Pro — not a suitable student model for cost reduction. C: Providing prompt-response pairs prevents Bedrock from using its proprietary synthesis techniques."}, {"id": 36, "domain": "Domain 4", "src": "Domain 4 Prep", "scenario": "A global media company needs to process millions of content summaries using Amazon Bedrock. The summaries are non-urgent and can be completed within 24 hours. The company wants to minimize cost.\n\nWhich solution is MOST cost-effective?", "opts": ["Use on-demand inference with multiple concurrent Lambda functions. Create CloudWatch alarms for throttling.", "Create batch inference jobs with an S3 I/O configuration. Implement area-specific processing to reduce per-token cost.", "Deploy provisioned throughput configurations during peak hours. Use batch inference during off-peak hours.", "Implement synchronous API calls with response streaming. Use Lambda functions with 15-minute timeouts."], "correct": [1], "exp": "Amazon Bedrock batch inference is specifically designed for large-scale, non-urgent workloads. It costs up to 50% less than on-demand inference. The S3 I/O configuration allows you to provide input in S3 (JSONL) and receive outputs in S3 — ideal for millions of records within a 24-hour window.", "wrong": "A: On-demand inference is more expensive than batch for large volumes. C: Provisioned throughput has fixed costs; batch inference is cheaper for non-real-time. D: Synchronous streaming for millions of records would take too long and costs more."}, {"id": 37, "domain": "Domain 4", "src": "Domain 4 Prep", "multi": 2, "scenario": "A manufacturing company develops an AI-powered quality control system using Amazon Bedrock. Engineers need real-time dashboards showing model performance trends. The system must store detailed request/response logs for compliance (90-day retention) and support alerting when error rates exceed 5%.\n\nWhich TWO configurations meet these requirements?", "opts": ["Enable Amazon Bedrock Model Invocation Logs. Use Amazon CloudWatch Logs as the destination for real-time metrics and dashboards.", "Create Amazon EventBridge rules to monitor Bedrock events and log request metadata.", "Enable AWS CloudTrail data event logging for Amazon Bedrock. Stream logs to Amazon Kinesis.", "Enable Bedrock Guardrails logging. Use CloudWatch Logs Insights for analysis.", "Enable Amazon Bedrock Model Invocation Logs. Use Amazon S3 as the destination for long-term storage and compliance."], "correct": [0, 4], "exp": "Model invocation logging to CloudWatch Logs enables real-time metrics, dashboards, and alarms (for the 5% error rate threshold). Logging to S3 provides long-term storage for the 90-day compliance requirement. Both can be enabled simultaneously.", "wrong": "B: EventBridge captures service events (not detailed request/response logs). C: CloudTrail logs API calls but not model input/output content needed for compliance. D: Guardrails logging captures guardrail interventions, not all invocations."}, {"id": 38, "domain": "Domain 4", "src": "Domain 4 Prep", "scenario": "A company's Bedrock customer service application is experiencing high latency. Analysis shows that 70% of requests use the same large system prompt (8,000 tokens). The remaining tokens are user queries. How can latency and cost be reduced?", "opts": ["Cache the system prompt responses in Amazon ElastiCache and return cached responses for similar queries.", "Enable Amazon Bedrock prompt caching to avoid reprocessing the static system prompt on each request.", "Compress the system prompt by summarizing it to 1,000 tokens.", "Move system prompt instructions to fine-tuned model weights by creating a custom model."], "correct": [1], "exp": "Bedrock prompt caching stores the processed key-value state of the static system prompt. Subsequent requests with the same system prompt skip reprocessing — reducing latency and cost by up to 90% for the cached portion. For a consistent 8,000-token system prompt, this is the optimal solution.", "wrong": "A: ElastiCache caches full responses, not the processing state. It helps for identical queries but not for varied user questions. C: Summarizing reduces quality/coverage. D: Fine-tuning is expensive and slow to iterate."}, {"id": 39, "domain": "Domain 4", "src": "Domain 4 Prep", "scenario": "A GenAI developer needs to minimize cost for a Bedrock application that runs the same 200 customer FAQ responses thousands of times daily. The responses are deterministic — the same input always produces the same expected output.\n\nWhich optimization is MOST cost-effective?", "opts": ["Use Bedrock batch inference for the FAQ responses.", "Enable Bedrock prompt caching for the FAQ prompts.", "Cache FAQ responses in Amazon ElastiCache and serve from cache for known questions.", "Use provisioned throughput to reduce per-token costs at scale."], "correct": [2], "exp": "For deterministic, repeated responses to known questions, application-level caching with ElastiCache is the most cost-effective approach. Once a response is computed and cached, subsequent identical requests cost nothing (no model invocation). This is more efficient than prompt caching (which still invokes the model) or batch inference.", "wrong": "A: Batch inference reduces cost vs on-demand but still invokes the model for each question. B: Prompt caching reduces processing of static prefixes but still invokes the model. D: Provisioned throughput still charges per token."}, {"id": 40, "domain": "Domain 5", "src": "Domain 5 Prep", "multi": 2, "scenario": "A company deploys a RAG application using Amazon Bedrock. The company must create a scalable and trustworthy evaluation framework to prevent factual errors and hallucinations, validate logical consistency, and ensure responses align with source documents.\n\nWhich TWO steps meet these requirements?", "opts": ["Configure Amazon Bedrock Guardrails with content filters to block harmful responses.", "Configure Amazon Bedrock Guardrails with contextual grounding checks.", "Run Amazon SageMaker Clarify to generate explainability reports for model outputs.", "Configure Amazon Bedrock Knowledge Bases evaluation jobs to validate factual claims in model outputs.", "Calculate ROUGE scores between generated responses and source document text."], "correct": [1, 3], "exp": "Guardrails contextual grounding checks verify that responses are grounded in source documents — preventing hallucinations by detecting when outputs aren't supported by retrieved content. Knowledge Bases evaluation jobs run automated RAG-specific assessments (faithfulness, relevance, groundedness) against source documents.", "wrong": "A: Content filters block harmful content categories, not factual errors. C: Clarify is designed for traditional ML bias/explainability, not GenAI RAG evaluation. E: ROUGE scores measure word overlap, not semantic accuracy or hallucination."}, {"id": 41, "domain": "Domain 5", "src": "Domain 5 Prep", "scenario": "A content management team is preparing to populate a Bedrock Knowledge Base with technical documentation. During test ingestion, many large PDF documents fail to ingest. The ingestion logs show 'INDEXING_FAILED' errors for files larger than 100 MB.\n\nWhat is the MOST likely fix?", "opts": ["Convert all PDFs to plain text format before ingestion.", "Enable compression on the S3 bucket hosting the documents.", "Split large documents into smaller files before uploading to S3.", "Increase the ingestion job timeout settings in the Knowledge Base configuration."], "correct": [2], "exp": "Amazon Bedrock Knowledge Bases has document size limits for ingestion. Large PDFs (100+ MB) commonly fail because they exceed processing limits. Splitting them into smaller files (e.g., chapter-by-chapter) is the correct fix. This also improves retrieval quality by creating more targeted chunks.", "wrong": "A: Plain text conversion reduces formatting but doesn't address file size limits for very large files. B: S3 compression doesn't affect how KB processes documents. D: Timeout settings may not be user-configurable for Knowledge Bases ingestion."}, {"id": 42, "domain": "Domain 5", "src": "Domain 5 Prep", "scenario": "A company uses Amazon Bedrock with Claude for a document analysis system. The system analyzes legal contracts (averaging 300 pages). Users report that the model doesn't answer questions about clauses in the first half of long contracts.\n\nWhich solution addresses this issue?", "opts": ["Implement recursive summarization to process each contract section independently and combine results.", "Use dynamic chunking with overlapping segments based on semantic boundaries. Implement hierarchical indexing for multi-level retrieval.", "Increase document batch size and fine-tune the model to expand context window handling.", "Apply standard fixed-token chunking. Process chunks independently and merge results."], "correct": [1], "exp": "The issue is that long contracts get chunked, and information from the first half may not be retrieved when querying. Dynamic semantic chunking with overlaps ensures context isn't lost at chunk boundaries. Hierarchical indexing creates a document summary layer enabling two-stage retrieval — first finding relevant sections, then retrieving detailed content.", "wrong": "A: Recursive summarization compresses information, losing clause-specific details. C: Fine-tuning doesn't expand the context window; batch size doesn't affect RAG retrieval quality. D: Fixed-token chunking without overlaps loses context at chunk boundaries."}, {"id": 43, "domain": "Domain 5", "src": "Domain 5 Prep", "scenario": "A developer deployed a Bedrock Agent but it never calls any of its 3 defined tools. The agent responds with 'I don't have the information needed to answer your question' to every query.\n\nWhat is the MOST likely cause?", "opts": ["The IAM role for the agent lacks permissions to invoke Lambda functions.", "The agent's system prompt is overriding the tool use instructions.", "The action group tool descriptions are too vague for the agent to understand when to use them.", "The agent's maximum number of steps is set too low."], "correct": [2], "exp": "Bedrock Agents use tool descriptions (name, description, input schema) to decide when to call tools. If descriptions are vague, generic, or don't match user query patterns, the agent won't recognize when to use them. Clear, specific descriptions of what each tool does and when to use it are critical for agent function.", "wrong": "A: If IAM permissions were missing, the agent would attempt tool use but fail with an error. B: System prompt instructions may help, but tool descriptions are the primary mechanism. D: Max steps affects how many reasoning cycles occur, not whether tools are used at all."}, {"id": 44, "domain": "Domain 5", "src": "Domain 5 Prep", "scenario": "A company wants to compare two versions of a Bedrock prompt (v1 vs v2) to determine which produces higher quality customer service responses. The comparison must use automated scoring across 500 test queries.\n\nWhich approach is MOST appropriate?", "opts": ["Create a Bedrock model evaluation job with both prompt variants. Use an LLM-as-judge to score responses for helpfulness and accuracy.", "Deploy both prompts to production with A/B traffic splitting and measure customer satisfaction scores.", "Use Amazon SageMaker Clarify to compare model outputs from both prompts.", "Manually review 50 responses from each prompt variant."], "correct": [0], "exp": "Amazon Bedrock model evaluation jobs support automated evaluation with an LLM-as-judge model that scores responses on custom criteria (helpfulness, accuracy, tone). Running this against both prompt variants on 500 test queries gives a statistically significant automated comparison — exactly what's needed.", "wrong": "B: Production A/B testing exposes customers to potentially worse quality and takes longer. C: Clarify is designed for traditional ML fairness/explainability. D: 50 manual reviews lack statistical significance and scale."}, {"id": 45, "domain": "Domain 5", "src": "ExamTopics", "scenario": "A retail company has a GenAI product recommendation application using Amazon Bedrock. The application suggests products based on browsing history and demographics. The company needs to implement fairness evaluation across demographic groups, monitor metrics in real time, receive alerts if fairness metrics show &gt;15% discrepancy between groups, and receive weekly reports comparing two prompt approaches.\n\nWhich solution meets these requirements with LEAST custom development effort?", "opts": ["Configure a CloudWatch dashboard with default Bedrock API metrics. Create custom metrics via EventBridge rules that invoke Lambda for post-processing fairness analysis.", "Create two prompt variants in Bedrock Prompt Management. Use Bedrock Flows to deploy variants with traffic allocation. Configure Bedrock Guardrails content filters for demographic fairness monitoring.", "Set up Amazon SageMaker Clarify to analyze model outputs. Publish fairness metrics to CloudWatch. Create CloudWatch composite alarms combining Clarify bias metrics with Bedrock latency metrics.", "Create a Bedrock model evaluation job to compare fairness between the two prompt variants. Enable model invocation logging. Set up CloudWatch alarms for InvocationsIntervened metrics per demographic group."], "correct": [2], "exp": "SageMaker Clarify analyzes model outputs for bias across demographic groups and publishes metrics to CloudWatch. CloudWatch composite alarms with thresholds alert on &gt;15% discrepancy. Scheduled reports can be generated from CloudWatch dashboards. This solution requires minimal custom development compared to A which needs custom Lambda.", "wrong": "A: Requires custom Lambda development for post-processing analysis. B: Guardrails content filters aren't designed for demographic fairness metrics. D: Model evaluation jobs are batch, not real-time; InvocationsIntervened measures guardrail blocks, not fairness metrics."}, {"id": 46, "domain": "Domain 3", "src": "ExamTopics", "multi": 3, "scenario": "A finance company is developing an AI assistant to help clients with investment planning. The company identifies high-risk patterns (specific stock recommendations, guaranteed returns) that could cause regulatory violations. The assistant must not provide inappropriate financial advice, generate content about competitors, or make ungrounded factual claims.\n\nWhich THREE steps using Amazon Bedrock Guardrails will meet these requirements?", "opts": ["Add high-risk conversation patterns (specific stock recommendations, guaranteed returns) to a denied topics guardrail.", "Configure a content filter guardrail to filter prompts containing high-risk conversation patterns.", "Configure a content filter guardrail to filter prompts containing competitor names.", "Add competitor names as custom word filters. Set input and output actions to block.", "Set a low grounding score threshold for contextual grounding checks.", "Set a high grounding score threshold for contextual grounding checks."], "correct": [0, 3, 5], "exp": "A: Denied topics blocks specific conversation categories (investment advice, guaranteed returns) — purpose-built for this. D: Custom word filters with competitor names and block action prevents competitor content. F: A high grounding score threshold (closer to 1.0) is more restrictive, rejecting responses that aren't well-grounded in company-approved financial guidance.", "wrong": "B: Content filters target harmful content (hate, violence) not regulatory topic categories. C: Content filters for competitor names aren't as precise as word filters. E: Low grounding threshold = permissive = allows ungrounded claims (wrong direction)."}, {"id": 47, "domain": "Domain 1", "src": "CertHero", "scenario": "An ecommerce company is developing a GenAI solution using Amazon Bedrock with Anthropic Claude to recommend products. Customers report that some recommended products are not available for sale, are not relevant, and response times are long. The company confirms most customer interactions are unique and products are not in the model's training data.\n\nWhich solution meets this requirement?", "opts": ["Increase grounding within Amazon Bedrock Guardrails. Enable automated reasoning checks. Set up provisioned throughput.", "Use prompt engineering to restrict model responses to relevant products. Use streaming inference to reduce perceived latency.", "Create an Amazon Bedrock Knowledge Base and implement Retrieval Augmented Generation (RAG). Set the PerformanceConfigLatency parameter to optimized.", "Store product catalog in Amazon OpenSearch Service. Validate model recommendations against the catalog. Use DynamoDB for response caching."], "correct": [2], "exp": "RAG with Bedrock Knowledge Bases grounds the model's responses in the actual product catalog, preventing hallucinated/unavailable recommendations. PerformanceConfigLatency=optimized enables Bedrock to use optimized retrieval and inference paths for lower latency. This addresses both correctness (RAG grounding) and performance (latency optimization).", "wrong": "A: Guardrails improve safety but don't ensure recommendations are limited to valid products. B: Prompt constraints alone cannot prevent hallucinations for products not in training data. D: OpenSearch + DynamoDB adds complexity and caching doesn't help for unique interactions."}, {"id": 48, "domain": "Domain 5", "src": "CertHero", "scenario": "A company is developing a GenAI application using Bedrock with several custom tool integrations. The application has experienced unexpected token consumpti
